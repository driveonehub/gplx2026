<!DOCTYPE html>
<!-- saved from url=(0014)about:internet -->
<html lang="vi"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Học lý thuyết thi GPLX 2026</title>
  <style>
    :root { --bg:#f7f3ed; --card:#fffdf9; --text:#1f2933; --muted:#6b7280; --line:#e8dfd2; --brand:#7c4a22; --brand-dark:#5f3617; --ok:#15803d; --bad:#b42318; --soft:#f3eadf; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.55; }
    .wrap { max-width:1040px; margin:0 auto; padding:18px; }
    .hero { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:22px; box-shadow:0 12px 36px rgba(30,20,10,.08); }
    h1 { margin:0 0 8px; font-size:clamp(26px,5vw,42px); line-height:1.1; }
    .muted { color:var(--muted); }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; margin:18px 0; }
    button { font:inherit; }
    .tab,.btn { border:1px solid var(--line); background:#fff; color:var(--text); padding:10px 13px; border-radius:999px; cursor:pointer; }
    .tab.active,.btn.primary { background:var(--brand); color:#fff; border-color:var(--brand); }
    .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:12px; position:sticky; top:0; z-index:5; }
    .toolbar input { flex:1 1 220px; min-width:0; border:1px solid var(--line); border-radius:999px; padding:11px 14px; font:inherit; background:#fff; }
    .stats { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; margin:16px 0; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px; }
    .stat b { display:block; font-size:24px; }
    .section-head { display:flex; justify-content:space-between; align-items:flex-end; gap:12px; margin:24px 0 12px; }
    .section-head h2 { margin:0; font-size:26px; }
    .qcard { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin:12px 0; box-shadow:0 6px 18px rgba(30,20,10,.04); }
    .qtop { display:flex; gap:10px; align-items:flex-start; }
    .qnum { flex:0 0 auto; min-width:38px; height:38px; display:grid; place-items:center; border-radius:12px; background:var(--soft); color:var(--brand-dark); font-weight:800; }
    .qtext { font-weight:700; font-size:17px; }
    .qid { color:var(--muted); font-size:13px; margin-top:3px; }
    .options { display:grid; gap:9px; margin-top:14px; }
    .option { width:100%; text-align:left; display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); background:#fff; border-radius:14px; padding:12px; cursor:pointer; }
    .option:hover { border-color:#c6a57e; }
    .letter { flex:0 0 auto; width:28px; height:28px; display:grid; place-items:center; border-radius:50%; background:#eee5da; font-weight:800; }
    .option.correct { border-color:rgba(21,128,61,.5); background:#edfdf3; }
    .option.correct .letter { background:var(--ok); color:#fff; }
    .option.wrong { border-color:rgba(180,35,24,.45); background:#fff1f0; }
    .option.wrong .letter { background:var(--bad); color:#fff; }
    .feedback { min-height:24px; margin-top:10px; font-weight:700; }
    .feedback.ok { color:var(--ok); }
    .feedback.bad { color:var(--bad); }
    .questions-img{ display:block; margin:12px auto; max-width:100%; height:auto; }
    .explain{ display:none; margin-top:12px; padding:12px; border:1px solid #ddd; border-radius:8px; background:#fafafa; }
    .explain img{ display:block; margin-top:8px; max-width:100%; height:auto; }
    .danger{ color:red; font-size:20px; font-weight:bold; margin-right:6px; }    
    .empty { background:var(--card); border:1px dashed var(--line); border-radius:18px; padding:24px; text-align:center; color:var(--muted); }
    @media (max-width:720px) { .wrap { padding:12px; } .stats { grid-template-columns:repeat(2,minmax(0,1fr)); } .toolbar { position:static; } .btn,.tab { padding:10px 11px; } }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Học lý thuyết thi GPLX 2026</h1>
      <div class="muted">Chọn để làm từng phần. Có thể chọn lại đáp án nhiều lần. Nếu chọn sai, hệ thống không hiển thị đáp án đúng.</div>
    </section>

    <nav id="tabs" class="tabs"><button type="button" class="tab active" data-section="phan-1">1. QUY ĐỊNH CHUNG</button><button type="button" class="tab " data-section="phan-2">2. ĐẠO ĐỨC</button><button type="button" class="tab " data-section="phan-3">3. KỸ THUẬT</button><button type="button" class="tab " data-section="phan-4">4. CẤU TẠO</button><button type="button" class="tab " data-section="phan-5">5. BIỂN BÁO</button><button type="button" class="tab " data-section="phan-6">6. SA HÌNH</button></nav>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Tìm câu hỏi, ID hoặc nội dung đáp án...">
      <button id="shuffleQuestions" class="btn primary" type="button">Xáo trộn câu hỏi</button>
      <button id="shuffleAnswers" class="btn" type="button">Xáo trộn đáp án</button>
      <button id="resetCurrent" class="btn" type="button">Làm lại đề này</button>
      <button id="resetAll" class="btn" type="button">Làm lại tất cả</button>
    </div>

    <section class="stats">
      <div class="stat"><span>Đang xem</span><b id="activeLabel">Đề 1</b></div>
      <div class="stat"><span>Đã làm</span><b><span id="done">0</span>/<span id="total">40</span></b></div>
      <div class="stat"><span>Đúng</span><b id="right">0</b></div>
      <div class="stat"><span>Sai</span><b id="wrong">0</b></div>
      <div class="stat"><span>Tỷ lệ đúng</span><b><span id="score">0</span>%</b></div>
    </section>

    <div id="app"></div>
  </main>

<script>
var DATA = [

{"id": "phan-1", "title": "Quy định chung", "count": 180, "questions": [
{"num":1,"id":1,"q":"Phần của đường bộ được sử dụng cho phương tiện giao thông đường bộ đi lại là gì?","opts":{"A":"Phần mặt đường và lề đường.","B":"Phần đường xe chạy.","C":"Phần đường xe cơ giới."},"answer":"B","shuffle":"false"}
]}, 



{"id": "phan-2", "title": "Đạo đức", "count": 25, "questions": [
{"num":181,"id":181,"q":"Người lái xe kinh doanh vận tải khi thực hiện tốt việc rèn luyện, nâng cao trách nhiệm, đạo đức nghề nghiệp sẽ thu được kết quả như thế nào dưới đây?","opts":{"A":" Được khách hàng, xã hội tôn trọng; được đồng nghiệp quý mến, giúp đỡ; được doanh nghiệp tin dùng và đóng góp nhiều cho xã hội; thu hút được khách hàng, góp phần quan trọng trong xây dựng thương hiệu, kinh doanh có hiệu quả cao.","B":"Được cộng điểm vào giấy phép lái xe.","C":"Cả hai ý trên."},"answer":"A"}
]},


{"id": "phan-3", "title": "Kỹ thuật", "count": 58, "questions": [
{"num":206,"id":206,"q":"Khi điều khiển xe mô tô tay ga xuống đường dốc dài, độ dốc cao, người lái xe cần thực hiện các thao tác nào dưới đây để bảo đảm an toàn?","opts":{"A":" Giữ tay ga ở mức độ phù hợp, sử dụng phanh trước và phanh sau để giảm tốc độ.","B":"Nhả hết tay ga, tắt động cơ, sử dụng phanh trước và phanh sau để giảm tốc độ.","C":"Sử dụng phanh trước để giảm tốc độ kết hợp với tắt chìa khóa điện của xe."},"answer":"A"}
]},


{"id": "phan-4", "title": "Cấu tạo", "count": 37, "questions": [
{"num":264,"id":264,"q":"Phương pháp kiểm tra mức dầu bôi trơn động cơ nào dưới đây là đúng?","opts":{"A":"Kiểm tra que thăm dầu trên các-te. Quan sát vệt dầu trên que thăm, mức dầu này phải nằm ở mức tối đa được thể hiện trên que thăm.","B":"Rút que thăm dầu trên các-te. Quan sát vệt dầu trên que thăm, mức dầu này phải nằm ở mức tối thiểu được thể hiện trên que thăm.","C":" Rút que thăm dầu trên các-te, lau sạch que thăm sau đó cắm vào các-te và rút ra quan sát vệt dầu trên que thăm, mức dầu phải nằm trong khoảng vạch mức tối thiểu và tối đa được thể hiện trên que thăm."},"answer":"C"}
]},


{"id": "phan-5", "title": "Biển báo", "count": 185, "questions": [
{"num":301,"id":301,"q":"Biển nào cấm các loại xe cơ giới đi vào, trừ xe máy hai bánh, xe gắn máy và các loại xe ưu tiên theo quy định?","img":"q301.jpg","opts":{"A":" Biển 1.","B":"Biển 2.","C":"Biển 1 và biển 3.","D":"Cả ba biển."},"answer":"A"}
]},

{"id": "phan-6", "title": "Sa hình", "count": 115, "questions": [
{"num":486,"id":486,"q":"Theo hướng mũi tên, xe nào chấp hành đúng quy tắc giao thông?","img":"q486.jpg","opts":{"A":"Xe khách, xe tải, xe mô tô.","B":"Xe tải, xe mô tô.","C":"Chỉ xe con."},"answer":"C","danger":"true","explain":"giai thích","explainImg":"q486.jpg","shuffle":"false"}
]}

];


var STORAGE_KEY = "quiz_5_sections_v2";
var LETTERS = ["A", "B", "C", "D"];
var activeSection = DATA.length ? DATA[0].id : "";
var searchText = "";
var state = createInitialState();

function byId(id) { return document.getElementById(id); }
function makeKey(sectionId, qid) { return sectionId + "::" + qid; }
function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
  });
}
function safeGetStorage() {
  try { return window.localStorage; } catch (e) { return null; }
}
function createInitialState() {
  var order = {};
  var optionOrders = {};
  for (var i = 0; i < DATA.length; i++) {
    var section = DATA[i];
    order[section.id] = [];
    for (var j = 0; j < section.questions.length; j++) {
      var q = section.questions[j];
      order[section.id].push(q.id);
      optionOrders[makeKey(section.id, q.id)] = q.opts ? Object.keys(q.opts) : [];
    }
  }
  return { order: order, optionOrders: optionOrders, answers: {} };
}
function loadState() {
  var storage = safeGetStorage();
  if (!storage) return;
  try {
    var raw = storage.getItem(STORAGE_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (saved && saved.order && saved.optionOrders && saved.answers) { state = saved; }
  } catch (e) {}
}
function saveState() {
  var storage = safeGetStorage();
  if (!storage) return;
  try { storage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
function shuffle(list) {
  var arr = list.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
  }
  return arr;
}
function getSection() {
  for (var i = 0; i < DATA.length; i++) if (DATA[i].id === activeSection) return DATA[i];
  return DATA[0];
}
function getQuestions(section, qid) {
  for (var i = 0; i < section.questions.length; i++) if (String(section.questions[i].id) === String(qid)) return section.questions[i];
  return null;
}
function matchesSearch(section, q) {
    if (!searchText) return true;
    var arr=[section.title,q.id,q.q];
    for(var k in q.opts){
        arr.push(q.opts[k]);
    }
    var haystack=arr.join(" ").toLowerCase();
    return haystack.indexOf(searchText.toLowerCase())!=-1;
}
function renderTabs() {
  var html = "";
  for (var i = 0; i < DATA.length; i++) {
    var s = DATA[i];
    html += '<button type="button" class="tab ' + (s.id === activeSection ? 'active' : '') + '" data-section="' + escapeHtml(s.id) + '">' + escapeHtml(s.title) + ' · ' + s.questions.length + '</button>';
  }
  byId('tabs').innerHTML = html;
}
function render() {
  renderTabs();
  var section = getSection();
  var ids = state.order[section.id] || [];
  var html = '<div class="section-head"><h2>' + escapeHtml(section.title) + '</h2><span class="muted">' + section.questions.length + ' câu</span></div>';
  var count = 0;
  for (var i = 0; i < ids.length; i++) {
    var q = getQuestions(section, ids[i]);
    if (!q || !matchesSearch(section, q)) continue;
    count++;
    var k = makeKey(section.id, q.id);
    var picked = state.answers[k] || "";
    var isRight = picked && picked === q.answer;
    // Chỉ lấy những đáp án thực sự có trong dữ liệu
    var optionOrder = (state.optionOrders[k] || Object.keys(q.opts))
    .filter(function(letter){
        return q.opts[letter] != null && q.opts[letter] !== "";
    });

    // ===== HIỂN THỊ CÂU HỎI =====
    html += '<article class="qcard"><div class="qtop"><div class="qnum">' + count + '</div><div>';
    html += '<div class="qtext">';

    if (q.danger) {
    html += '<span class="danger">★ </span>';
    }

    html += escapeHtml(q.q);
    html += '</div>';

    if (q.img) {
    html += '<img class="questions-img" src="' + escapeHtml(q.img) + '">';
    }

    html += '<div class="qid">ID: ' + escapeHtml(q.id) + '</div>';
    html += '</div></div>';

    html += '<div class="options">';

    // ===== HIỂN THỊ ĐÁP ÁN =====
    for (var j = 0; j < optionOrder.length; j++) {

    var letter = optionOrder[j];

    var cls = "";

    if (picked === letter) {
        cls = (letter === q.answer ? " correct" : " wrong");
    }

    html += '<button type="button" class="option' + cls +
        '" data-section="' + escapeHtml(section.id) +
        '" data-qid="' + escapeHtml(q.id) +
        '" data-letter="' + letter + '">' +

        '<span class="letter">' + (j + 1) + '</span>' +

        '<span>' + escapeHtml(q.opts[letter]) + '</span>' +

        '</button>';
}

    var feedback = "";
    var fcls = "";
    if (picked) { feedback = isRight ? "Đúng." : "Sai. Bạn chọn " + picked + "."; fcls = isRight ? " ok" : " bad"; }

    html += '</div>';
    html += '<div class="feedback' + fcls + '">'
      + escapeHtml(feedback)
      + '</div>';

    if (picked && (q.explain || q.explainImg)) {

    html += '<div class="explain" style="display:block">';

    if (q.explain) {
        html += '<p>' + escapeHtml(q.explain) + '</p>';
    }

    if (q.explainImg) {
        html += '<img class="questions-img" src="' +
                 escapeHtml(q.explainImg) + '">';
    }

    html += '</div>';
    }

    html += '</article>';
    }
      if (count === 0) html = '<div class="empty">Không tìm thấy câu hỏi phù hợp.</div>';
      byId('app').innerHTML = html;
      updateStats();
    }
function updateStats() {
  var section = getSection();
  var done = 0, right = 0;
  for (var i = 0; i < section.questions.length; i++) {
    var q = section.questions[i];
    var picked = state.answers[makeKey(section.id, q.id)];
    if (picked) { done++; if (picked === q.answer) right++; }
  }
  byId('activeLabel').textContent = section.title;
  byId('done').textContent = done;
  byId('total').textContent = section.questions.length;
  byId('right').textContent = right;
  byId('wrong').textContent = done - right;
  byId('score').textContent = done ? Math.round((right / done) * 100) : 0;
}
document.addEventListener('click', function(e) {
  var btn = e.target.closest ? e.target.closest('button') : null;
  if (!btn) return;
  if (btn.className.indexOf('tab') !== -1) { activeSection = btn.getAttribute('data-section'); render(); window.scrollTo(0, 0); return; }
  if (btn.className.indexOf('option') !== -1) {
    var k = makeKey(btn.getAttribute('data-section'), btn.getAttribute('data-qid'));
    state.answers[k] = btn.getAttribute('data-letter');
    saveState(); render(); return;
  }
});
byId('shuffleQuestions').onclick = function() {
  var section = getSection();
  state.order[section.id] = shuffle(state.order[section.id] || section.questions.map(function(q) { return q.id; }));
  saveState(); render();
};
byId('shuffleAnswers').onclick=function(){
    var section=getSection();
    for(var i=0;i<section.questions.length;i++){
        var q=section.questions[i];
        if (q.shuffle === false || q.shuffle === "false") {
            continue;
        }
        var letters=Object.keys(q.opts);
        var values=[];
        for(var j=0;j<letters.length;j++){
            values.push(q.opts[letters[j]]);
        }
        values=shuffle(values);
        var newOpts={};
        for(var j=0;j<letters.length;j++){
            newOpts[letters[j]]=values[j];
        }
        var answerText=q.opts[q.answer];
        for(var j=0;j<letters.length;j++){
            if(newOpts[letters[j]]==answerText){
                q.answer=letters[j];
                break;
            }
        }
        q.opts=newOpts;
    }
    saveState();
    render();
};

byId('resetCurrent').onclick = function() {
  if (!confirm('Làm lại đề đang xem?')) return;
  var section = getSection();
  for (var i = 0; i < section.questions.length; i++) delete state.answers[makeKey(section.id, section.questions[i].id)];
  saveState(); render();
};
byId('resetAll').onclick = function() {
  if (!confirm('Xoá toàn bộ tiến độ của 5 đề?')) return;
  state = createInitialState();
  saveState(); render();
};
byId('search').oninput = function(e) { searchText = e.target.value.replace(/^\s+|\s+$/g, ''); render(); };
loadState();
render();
</script>


</body></html>
