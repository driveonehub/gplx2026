  <style>
    :root { --bg:#f7f3ed; --card:#fffdf9; --text:#1f2933; --muted:#6b7280; --line:#e8dfd2; --brand:#7c4a22; --brand-dark:#5f3617; --ok:#15803d; --bad:#b42318; --soft:#f3eadf; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.55; }

    .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:18px; padding:12px; position:sticky; top:0; z-index:5; }
    .toolbar input { flex:1 1 220px; min-width:0; border:1px solid var(--line); border-radius:999px; padding:11px 14px; font:inherit; background:#fff; }
    .stats { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; margin:16px 0; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px; }
    .stat b { display:block; font-size:24px; }
    .section-head { display:flex; justify-content:space-between; align-items:flex-end; gap:12px; margin:24px 0 12px; }
    .section-head h2 { margin:0; font-size:26px; }
    .qcard { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin:12px 0; box-shadow:0 6px 18px rgba(30,20,10,.04); }
    .qtop { display:flex; gap:10px; align-items:flex-start; }
    .qnum { flex:0 0 auto; min-width:38px; height:38px; display:grid; place-items:center; border-radius:12px; background:var(--soft); color:var(--brand-dark); font-weight:800; }
    .qtext { font-weight:700; font-size:17px; }
    .qid { color:var(--muted); font-size:13px; margin-top:3px; }
    .options { display:grid; gap:9px; margin-top:14px; }
    .option { width:100%; text-align:left; display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); background:#fff; border-radius:14px; padding:12px; cursor:pointer; }
    .option:hover { border-color:#c6a57e; }
    .letter { flex:0 0 auto; width:28px; height:28px; display:grid; place-items:center; border-radius:50%; background:#eee5da; font-weight:800; }
    .option.correct { border-color:rgba(21,128,61,.5); background:#edfdf3; }
    .option.correct .letter { background:var(--ok); color:#fff; }
    .option.wrong { border-color:rgba(180,35,24,.45); background:#fff1f0; }
    .option.wrong .letter { background:var(--bad); color:#fff; }
    .feedback { min-height:24px; margin-top:10px; font-weight:700; }
    .feedback.ok { color:var(--ok); }
    .feedback.bad { color:var(--bad); }
    .questions-img{ display:block; margin:12px auto; max-width:100%; height:auto; }
    .explain{ display:none; margin-top:12px; padding:12px; border:1px solid #ddd; border-radius:8px; background:#fafafa; }
    .explain img{ display:block; margin-top:8px; max-width:100%; height:auto; }
    .danger{ color:red; font-size:20px; font-weight:bold; margin-right:6px; }    
    .empty { background:var(--card); border:1px dashed var(--line); border-radius:18px; padding:24px; text-align:center; color:var(--muted); }
    @media (max-width:720px) { .wrap { padding:12px; } .stats { grid-template-columns:repeat(2,minmax(0,1fr)); } .toolbar { position:static; } .btn,.tab { padding:10px 11px; } }
  </style>
</head>

{"num":2,"id":2,"q":"Làn đường là gì?","opts":{"A":"Là một phần của phần đường xe chạy được chia theo chiều dọc của đường, sử dụng cho xe chạy.","B":"Là một phần của phần đường xe chạy được chia theo chiều dọc của đường, có đủ chiều rộng cho xe chạy an toàn.","C":"Là đường cho xe ô tô chạy, dừng, đỗ an toàn."},"answer":"B"},
{"num":3,"id":3,"q":"Khổ giới hạn của đường bộ được hiểu như thế nào là đúng?","opts":{"A":"Khổ giới hạn của đường bộ là khoảng trống có kích thước giới hạn về chiều rộng, chiều cao của đường bộ để các xe, bao gồm cả hàng hoá xếp trên xe đi qua được an toàn và được xác định theo quy chuẩn, tiêu chuẩn kỹ thuật của đường bộ.","B":"Là khoảng trống có kích thước giới hạn về chiều rộng của đường, cầu, bến phà, hầm trên đường bộ để các xe kể cả hàng hóa xếp trên xe đi qua được an toàn.","C":"Là khoảng trống có kích thước giới hạn về chiều cao của cầu, bến phà, hầm trên đường bộ để các xe đi qua được an toàn."},"answer":"A"},
{"num":4,"id":4,"q":"Dải phân cách được lắp đặt để làm gì?","opts":{"A":"Để phân chia các làn đường dành cho xe cơ giới và xe thô sơ trên đường cao tốc.","B":"Để phân chia phần đường xe chạy thành hai chiều riêng biệt hoặc để phân chia phần đường dành cho xe cơ giới và xe thô sơ hoặc của nhiều loại xe khác nhau trên cùng một chiều đường.","C":"Để phân tách phần đường xe chạy và hành lang an toàn giao thông."},"answer":"B"},
{"num":5,"id":5,"q":"Vạch kẻ đường là gì?","opts":{"A":"Là báo hiệu đường bộ để hỗ trợ cảnh báo nguy hiểm cho người tham gia giao thông đường bộ.","B":"Là vạch chỉ sự phân chia làn đường, vị trí hoặc hướng đi, vị trí dừng lại.","C":"Là báo hiệu cho người tham gia giao thông đường bộ về các thông tin của đường bộ.","D":"Cả ba ý trên."},"answer":"B"},

{"num":8,"id":8,"q":"Trong nhóm các phương tiện giao thông đường bộ dưới đây, nhóm phương tiện nào là xe cơ giới?","opts":{"A":"Xe ô tô; máy kéo; xe mô tô hai bánh; xe mô tô ba bánh; xe gắn máy; xe cơ giới dùng cho người khuyết tật và xe máy chuyên dùng; xe đạp, xe đạp máy, xe đạp điện.","B":"Xe ô tô; rơ moóc được kéo bởi xe ô tô; sơ mi rơ moóc được kéo bởi ô tô đầu kéo; xe chở người bốn bánh có gắn động cơ; xe chở hàng bốn bánh có gắn động cơ; xe mô tô, xe gắn máy và các loại xe tương tự."},"answer":"B"},
{"num":9,"id":9,"q":"Trong nhóm các phương tiện giao thông đường bộ dưới đây, nhóm phương tiện nào là xe thô sơ?","opts":{"A":" Xe đạp, xe đạp máy, xe đạp điện; xe xích lô; xe lăn dùng cho người khuyết tật; xe vật nuôi kéo và các loại xe tương tự.","B":"Xe đạp (kể cả xe đạp máy, xe đạp điện), xe gắn máy, xe cơ giới dùng cho người khuyết tật và xe máy chuyên dùng.","C":"Xe ô tô, máy kéo, rơ moóc hoặc sơ mi rơ moóc được kéo bởi xe ô tô, máy kéo."},"answer":"A"},
{"num":10,"id":10,"q":"Phương tiện giao thông đường bộ gồm những loại nào?","opts":{"A":"Phương tiện giao thông cơ giới đường bộ.","B":"Phương tiện giao thông thô sơ đường bộ, xe máy chuyên dùng và các loại xe tương tự.","C":" Cả hai ý trên."},"answer":"C"},
{"num":11,"id":11,"q":"Người tham gia giao thông đường bộ gồm những đối tượng nào?","opts":{"A":"Người điều khiển, người được chở trên phương tiện tham gia giao thông đường bộ.","B":"Người điều khiển, dẫn dắt vật nuôi trên đường bộ; người đi bộ trên đường bộ.","C":" Cả hai ý trên."},"answer":"C"},
{"num":12,"id":12,"q":"Người điều khiển phương tiện tham gia giao thông đường bộ gồm những đối tượng nào dưới đây?","opts":{"A":"Người điều khiển xe cơ giới, người điều khiển xe thô sơ.","B":"Người điều khiển xe máy chuyên dùng.","C":" Cả hai ý trên."},"answer":"C"},

{"num":14,"id":14,"q":"Dừng xe được hiểu như thế nào là đúng?","opts":{"A":"Là trạng thái đứng yên của xe không giới hạn thời gian để cho người lên, xuống xe, xếp dỡ hàng hóa hoặc thực hiện công việc khác.","B":" Là trạng thái đứng yên tạm thời của xe trong một khoảng thời gian cần thiết đủ để cho người lên xe, xuống xe, xếp dỡ hàng hóa, kiểm tra kỹ thuật xe hoặc hoạt động khác. Khi dừng xe không được tắt máy và không được rời khỏi vị trí lái, trừ trường hợp rời khỏi vị trí lái để đóng, mở cửa xe, xếp dỡ hàng hóa, kiểm tra kỹ thuật xe nhưng phải sử dụng phanh đỗ xe hoặc thực hiện biện pháp an toàn khác.","C":"Là trạng thái đứng yên của xe không giới hạn thời gian giữa 02 lần vận chuyển hàng hóa hoặc hành khách."},"answer":"B"},
{"num":15,"id":15,"q":"Đỗ xe được hiểu như thế nào là đúng?","opts":{"A":"Là trạng thái đứng yên của xe có giới hạn thời gian trong một khoảng thời gian cần thiết đủ để cho người lên, xuống xe đó, xếp dỡ hàng hóa hoặc thực hiện công việc khác.","B":" Là trạng thái đứng yên của xe không giới hạn thời gian. Khi đỗ xe, người điều khiển phương tiện tham gia giao thông đường bộ chỉ được rời khỏi xe khi đã sử dụng phanh đỗ xe hoặc thực hiện biện pháp an toàn khác. Xe đỗ trên đoạn đường dốc phải đánh lái về phía lề đường, chèn bánh."},"answer":"B"},
{"num":16,"id":16,"q":"Đường cao tốc được hiểu như thế nào là đúng?","opts":{"A":" Là một cấp kỹ thuật của đường bộ, chỉ dành cho một số loại xe cơ giới, xe máy chuyên dùng tham gia giao thông theo quy định của pháp luật. Có dải phân cách phân chia hai chiều xe chạy riêng biệt, không giao nhau cùng mức với một hoặc các đường khác, chỉ cho xe ra, vào ở những điểm nhất định. Có hàng rào bảo vệ, trang thiết bị phục vụ, bảo đảm giao thông liên tục, an toàn, rút ngắn thời gian hành trình.","B":"Là đường nối liền Thủ đô Hà Nội với trung tâm hành chính cấp tỉnh; đường nối liền các trung tâm hành chính cấp tỉnh; đường có vị trí quan trọng đối với sự phát triển kinh tế- xã hội, bảo đảm quốc phòng, an ninh của vùng, khu vực."},"answer":"A"},
{"num":17,"id":17,"q":"Thiết bị an toàn cho trẻ em được hiểu như thế nào là đúng?","opts":{"A":" Là thiết bị có đủ khả năng bảo đảm an toàn cho trẻ em ở tư thế ngồi hoặc nằm trên xe ô tô, được thiết kế để giảm nguy cơ chấn thương cho người dùng trong trường hợp xảy ra va chạm hoặc xe ô tô giảm tốc độ đột ngột, bằng cách hạn chế sự di chuyển của cơ thể trẻ em.","B":"Là thiết bị có đủ khả năng bảo đảm an toàn cho trẻ em ở tư thế đứng hoặc nằm trên xe ô tô, được thiết kế để giảm nguy cơ chấn thương cho người dùng trong trường hợp xe ô tô lưu thông bình thường."},"answer":"A"},
{"num":18,"id":18,"q":"Theo chức năng phục vụ thì đường bộ được phân loại như thế nào?","opts":{"A":" Đường chính, đường nhánh, đường gom, đường bên, đường dành cho giao thông công cộng, đường nội bộ, đường dành riêng cho người đi bộ, người đi xe đạp và các đường khác.","B":"Đường chính, đường nhánh, đường gom, đường dành cho giao thông công cộng, đường nội bộ, đường dành riêng cho người đi bộ, người đi xe đạp và các đường khác.","C":"Đường chính, đường nhánh, đường gom, đường bên, đường dành cho giao thông công cộng, đường dành riêng cho người đi bộ, người đi xe đạp và các đường khác."},"answer":"A"},
{"num":19,"id":19,"q":"Hành vi nào dưới đây bị nghiêm cấm?","opts":{"A":"Sử dụng xe đạp đi trên các tuyến quốc lộ.","B":" Rải vật sắc nhọn, đổ chất gây trơn trượt trên đường bộ.","C":"Cả hai ý trên."},"answer":"B","danger":"true"},
{"num":20,"id":20,"q":"Hành vi đưa xe cơ giới, xe máy chuyên dùng tham gia giao thông đường bộ nào dưới đây bị cấm?","opts":{"A":"Không có chứng nhận kiểm định an toàn kỹ thuật và bảo vệ môi trường.","B":"Hết niên hạn sử dụng.","C":" Cả hai ý trên."},"answer":"C","danger":"true"},
{"num":21,"id":21,"q":"Tổ chức đua xe được phép thực hiện khi nào?","opts":{"A":"Trên đường phố không có người qua lại.","B":"Được người dân ủng hộ.","C":" Được cơ quan có thẩm quyền cấp phép."},"answer":"C","danger":"true"},
{"num":22,"id":22,"q":"Hành vi đua xe trái phép bị xử lý như thế nào?","opts":{"A":"Chỉ bị nhắc nhở.","B":" Tùy theo mức độ của hành vi vi phạm có thể bị xử lý hành chính hoặc xử lý hình sự."},"answer":"B","danger":"true"},
{"num":23,"id":23,"q":"Hành vi của người điều khiển xe ô tô và các loại xe tương tự khi tham gia giao thông đường bộ mà trong cơ thể có chất ma túy thì bị áp dụng hình thức xử phạt vi phạm hành chính nào dưới đây?","opts":{"A":"Bị phạt tiền.","B":"Bị tước giấy phép lái xe.","C":" Cả hai ý trên."},"answer":"C","danger":"true"},
{"num":24,"id":24,"q":"Người điều khiển phương tiện tham gia giao thông đường bộ mà trong máu hoặc hơi thở có nồng độ cồn có bị nghiêm cấm không?","opts":{"A":" Bị nghiêm cấm.","B":"Không bị nghiêm cấm.","C":"Không bị nghiêm cấm, nếu nồng độ cồn trong máu ở mức nhẹ, có thể điều khiển phương tiện tham gia giao thông."},"answer":"A","danger":"true"},
{"num":25,"id":25,"q":"Hành vi của người điều khiển xe ô tô và các loại xe tương tự khi tham gia giao thông đường bộ mà trong máu hoặc hơi thở có nồng độ cồn thì bị áp dụng hình thức xử phạt vi phạm hành chính nào dưới đây?","opts":{"A":"Bị phạt tiền.","B":"Có thể bị tước giấy phép lái xe.","C":" Cả hai ý trên."},"answer":"C","danger":"true"},
{"num":26,"id":26,"q":"Theo Luật Phòng chống tác hại của rượu, bia, đối tượng nào dưới đây bị cấm sử dụng rượu, bia khi tham gia giao thông?","opts":{"A":" Người điều khiển xe ô tô, xe mô tô, xe đạp, xe gắn máy.","B":"Người được chở trên xe cơ giới.","C":"Cả hai ý trên."},"answer":"A","danger":"true"},
{"num":27,"id":27,"q":"Hành vi giao xe ô tô, mô tô cho người nào sau đây tham gia giao thông đường bộ bị nghiêm cấm?","opts":{"A":"Người chưa đủ tuổi theo quy định.","B":"Người không có giấy phép lái xe.","C":"Người có giấy phép lái xe nhưng đã bị trừ hết 12 điểm.","D":" Cả ba ý trên."},"answer":"D","danger":"true"},
{"num":28,"id":28,"q":"Hành vi nào sau đây bị nghiêm cấm?","opts":{"A":"Điều khiển xe cơ giới lạng lách, đánh võng, rú ga liên tục khi tham gia giao thông trên đường.","B":"Xúc phạm, đe dọa, cản trở, chống đối hoặc không chấp hành hiệu lệnh, hướng dẫn, yêu cầu kiểm tra, kiểm soát của người thi hành công vụ về bảo đảm trật tự, an toàn giao thông đường bộ.","C":" Cả hai ý trên."},"answer":"C","danger":"true"},
{"num":29,"id":29,"q":"Các hành vi nào sau đây bị cấm đối với phương tiện tham gia giao thông đường bộ?","opts":{"A":"Cải tạo xe ô tô loại khác thành xe ô tô chở người phục vụ mục đích quốc phòng, an ninh.","B":" Cải tạo trái phép; cố ý can thiệp làm sai lệch chỉ số trên đồng hồ báo quãng đường đã chạy của xe ô tô; cắt, hàn, tẩy xóa, đục sửa, đóng lại trái phép số khung, số động cơ của xe cơ giới, xe máy chuyên dùng."},"answer":"B"},
{"num":30,"id":30,"q":"Hành vi nào sau đây bị cấm?","opts":{"A":"Lắp đặt, sử dụng thiết bị âm thanh, ánh sáng trên xe cơ giới, xe máy chuyên dùng gây mất trật tự, an toàn giao thông đường bộ.","B":"Cản trở người, phương tiện tham gia giao thông trên đường bộ; ném gạch, đất, đá, cát hoặc vật thể khác vào người, phương tiện đang tham gia giao thông trên đường bộ.","C":" Cả hai ý trên."},"answer":"C","danger":"true"},
{"num":31,"id":31,"q":"Việc sản xuất, sử dụng, mua, bán trái phép biển số xe có bị nghiêm cấm hay không?","opts":{"A":"Không bị nghiêm cấm.","B":" Bị nghiêm cấm.","C":"Bị nghiêm cấm tuỳ trường hợp."},"answer":"B"},
{"num":32,"id":32,"q":"Khi điều khiển phương tiện tham gia giao thông, những hành vi nào dưới đây bị nghiêm cấm?","opts":{"A":"Thay đổi tốc độ của xe nhiều lần.","B":"Điều khiển phương tiện sau 23 giờ trong ngày.","C":" Lạng lách, đánh võng, rú ga liên tục."},"answer":"C","danger":"true"},
{"num":33,"id":33,"q":"Có bao nhiêu nhóm biển báo hiệu đường bộ?","opts":{"A":"Ba nhóm: Biển báo cấm, biển báo nguy hiểm và biển hiệu lệnh.","B":"Bốn nhóm: Biển báo cấm, biển báo nguy hiểm, biển hiệu lệnh và biển phụ.","C":" Năm nhóm: Biển báo cấm, biển báo nguy hiểm, biển hiệu lệnh, biển chỉ dẫn, biển phụ."},"answer":"C"},
{"num":34,"id":34,"q":"Tại nơi có vạch kẻ đường hoặc tại nơi mà người đi bộ, xe lăn của người khuyết tật đang qua đường, người điều khiển phương tiện tham gia giao thông phải thực hiện như thế nào?","opts":{"A":"Giảm tốc độ và nhường đường cho người đi bộ, xe lăn của người khuyết tật qua đường đảm bảo an toàn.","B":" Quan sát, giảm tốc độ hoặc dừng lại để bảo đảm an toàn cho người đi bộ, xe lăn của người khuyết tật qua đường.","C":"Quan sát, tăng tốc độ và điều khiển phương tiện nhanh chóng đi qua."},"answer":"B","danger":"true"},
{"num":35,"id":35,"q":"Người điều khiển xe mô tô phải phải quan sát, giảm tốc độ hoặc dừng lại để bảo đảm an toàn trong các trường hợp nào dưới đây?","opts":{"A":"Đường hẹp, đường vòng, đường quanh co, đường đèo, dốc.","B":"Nơi cầu, cống hẹp, đập tràn, đường ngầm, hầm chui, hầm đường bộ.","C":"Trời mưa, gió, sương, khói, bụi, mặt đường trơn trượt, lầy lội, có nhiều đất đá, vật liệu rơi vãi ảnh hưởng đến an toàn giao thông đường bộ.","D":" Cả ba ý trên."},"answer":"D","danger":"true"},
{"num":36,"id":36,"q":"Khi gặp hiệu lệnh điều khiển của Cảnh sát giao thông như hình dưới đây thì người tham gia giao thông đường bộ phải đi như thế nào là đúng quy tắc giao thông?","opts":{"A":"Người tham gia giao thông đường bộ ở các hướng phải dừng lại.","B":"Người tham gia giao thông đường bộ ở các hướng được đi theo chiều gậy chỉ của Cảnh sát giao thông.","C":"Người tham gia giao thông đường bộ ở phía trước và phía sau người điều khiển được đi tất cả các hướng; người tham gia giao thông đường bộ ở phía bên phải và phía bên trái người điều khiển phải dừng lại.","D":" Người tham gia giao thông đường bộ ở phía trước và phía sau người điều khiển phải dừng lại; người tham gia giao thông đường bộ ở phía bên phải và phía bên trái người điều khiển được đi tất cả các hướng."},"answer":"D"},
{"num":37,"id":37,"q":"Khi gặp hiệu lệnh điều khiển của Cảnh sát giao thông như hình dưới đây thì người tham gia giao thông đường bộ phải đi như thế nào là đúng quy tắc giao thông?","opts":{"A":"Người tham gia giao thông đường bộ ở phía sau Cảnh sát giao thông được đi, các hướng khác phải dừng lại.","B":"Người tham gia giao thông đường bộ được rẽ phải theo chiều mũi tên màu xanh ở bục Cảnh sát giao thông.","C":" Người tham gia giao thông đường bộ ở tất cả các hướng phải dừng lại, trừ các xe đã ở trong khu vực giao nhau.","D":"Người tham gia giao thông đường bộ ở phía trước Cảnh sát giao thông phải dừng lại, các hướng khác được đi."},"answer":"C"},
{"num":38,"id":38,"q":"Khi hiệu lệnh của người điều khiển giao thông trái với tín hiệu đèn giao thông hoặc biển báo hiệu đường bộ thì người tham gia giao thông đường bộ phải chấp hành báo hiệu đường bộ nào dưới đây?","opts":{"A":" Theo hiệu lệnh của người điều khiển giao thông.","B":"Theo tín hiệu đèn giao thông.","C":"Theo biển báo hiệu đường bộ."},"answer":"A"},
{"num":39,"id":39,"q":"Khi ở một vị trí vừa có biển báo hiệu đặt cố định vừa có biển báo hiệu tạm thời mà hai biển có ý nghĩa khác nhau, người tham gia giao thông đường bộ phải chấp hành hiệu lệnh của biển báo hiệu nào?","opts":{"A":"Biển báo hiệu đặt cố định.","B":" Biển báo hiệu tạm thời.","C":"Theo quyết định của người tham gia giao thông nhưng phải bảo đảm an toàn."},"answer":"B"},
{"num":40,"id":40,"q":"Tại nơi đường giao nhau, khi đèn điều khiển giao thông có tín hiệu màu vàng, người điều khiển phương tiện tham gia giao thông phải chấp hành như thế nào là đúng quy tắc giao thông?","opts":{"A":" Dừng lại trước vạch dừng; trường hợp đang đi trên vạch dừng hoặc đã đi qua vạch dừng mà tín hiệu đèn màu vàng thì được đi tiếp; trường hợp tín hiệu đèn màu vàng nhấp nháy, người điều khiển phương tiện tham gia giao thông đường bộ được đi nhưng phải quan sát, giảm tốc độ hoặc dừng lại nhường đường cho người đi bộ, xe lăn của người khuyết tật qua đường hoặc các phương tiện khác.","B":"Tăng tốc độ nhanh chóng vượt qua nút giao.","C":"Quan sát, giảm tốc độ, từ từ vượt qua nút giao."},"answer":"A"},
{"num":41,"id":41,"q":"Người lái xe trên đường cần chấp hành quy định về tốc độ tối đa như thế nào?","opts":{"A":"Chỉ lớn hơn tốc độ tối đa cho phép khi đường vắng.","B":"Chỉ lớn hơn tốc độ tối đa cho phép khi vào ban đêm.","C":" Không vượt quá tốc độ tối đa cho phép."},"answer":"C"},
{"num":42,"id":42,"q":"Khi chở trẻ em dưới 10 tuổi và chiều cao dưới 1,35 mét trên xe ô tô, người lái xe phải thực hiện quy tắc nào dưới đây để bảo đảm an toàn?","opts":{"A":" Không được cho trẻ em ngồi cùng hàng ghế với người lái xe, trừ loại xe ô tô chỉ có một hàng ghế; người lái xe phải sử dụng, hướng dẫn sử dụng thiết bị an toàn phù hợp cho trẻ em.","B":"Cho trẻ em ngồi cùng hàng ghế với người lái xe, người lái xe phải sử dụng, hướng dẫn sử dụng thiết bị an toàn phù hợp cho trẻ em."},"answer":"A"},
{"num":43,"id":43,"q":"Phương tiện tham gia giao thông đường bộ di chuyển với tốc độ thấp hơn phải đi như thế nào?","opts":{"A":"Đi về bên trái theo chiều đi của mình.","B":" Đi về bên phải theo chiều đi của mình.","C":"Đi ở bất cứ bên nào nhưng phải bấm đèn cảnh báo nguy hiểm để báo hiệu cho các phương tiện khác."},"answer":"B"},
{"num":44,"id":44,"q":"Trên một chiều đường có vạch kẻ phân làn đường, người lái xe cơ giới, xe máy chuyên dùng phải điều khiển xe đi trên làn đường nào?","opts":{"A":"Đi trên làn đường bên phải trong cùng.","B":" Đi trên làn đường bên trái.","C":"Đi ở bất cứ làn nào nhưng phải bảo đảm tốc độ cho phép."},"answer":"B"},
{"num":45,"id":45,"q":"Người lái xe phải giảm tốc độ, có tín hiệu rẽ phải và đi sát về bên phải của phần đường xe chạy trong các trường hợp nào dưới đây?","opts":{"A":"Khi xe chạy phía trước có tín hiệu vượt xe khác.","B":"Khi phía trước có xe chạy ngược chiều.","C":" Khi xe sau xin vượt nếu đủ điều kiện an toàn.","D":"Khi xe sau có tín hiệu vượt bên phải."},"answer":"C"},
{"num":46,"id":46,"q":"Vượt xe là gì?","opts":{"A":" Là tình huống giao thông trên đường mà mỗi chiều đường xe chạy chỉ có một làn đường dành cho xe cơ giới, xe đi phía sau di chuyển sang bên trái để di chuyển lên trước xe phía trước.","B":"Là tình huống giao thông trên đường có từ hai làn đường dành cho xe cơ giới cùng chiều trở lên được phân biệt bằng vạch kẻ đường, xe đi phía sau di chuyển lên trước xe phía trước theo quy tắc sử dụng làn đường."},"answer":"A"},
{"num":47,"id":47,"q":"Người lái xe được phép vượt xe trên cầu hẹp có một làn đường, đường cong có tầm nhìn bị hạn chế hay không?","opts":{"A":"Được phép vượt khi đường vắng.","B":" Không được phép vượt.","C":"Được phép vượt khi có việc gấp."},"answer":"B","danger":"true"},
{"num":48,"id":48,"q":"Muốn vượt xe phía trước, người lái xe mô tô phải có tín hiệu như thế nào dưới đây để bảo đảm an toàn?","opts":{"A":"Bấm còi liên tục để xe phía trước biết xe mình xin vượt.","B":"Rú ga liên tục để xe phía trước biết xe mình xin vượt.","C":" Báo hiệu nhấp nháy bằng đèn chiếu sáng phía trước hoặc còi."},"answer":"C","danger":"true"},
{"num":49,"id":49,"q":"Khi lái xe trong khu đông dân cư, khu vực cơ sở khám bệnh, chữa bệnh trừ các khu vực có biển cấm sử dụng còi, người lái xe được sử dụng còi trong thời gian nào?","opts":{"A":"Từ 22 giờ ngày hôm trước đến 05 giờ ngày hôm sau.","B":" Từ 05 giờ đến 22 giờ.","C":"Từ 23 giờ ngày hôm trước đến 05 giờ sáng hôm sau."},"answer":"B"},
{"num":50,"id":50,"q":"Phương tiện tham gia giao thông đường bộ chỉ được sử dụng tín hiệu còi trong các trường hợp nào sau đây?","opts":{"A":" Để báo hiệu cho người tham gia giao thông đường bộ khi xuất hiện tình huống có thể mất an toàn giao thông hoặc báo hiệu chuẩn bị vượt xe.","B":"Để báo hiệu cho người tham gia giao thông đường bộ từ 22 giờ ngày hôm trước đến 05 giờ ngày hôm sau trong khu đông dân cư, khu vực cơ sở khám bệnh, chữa bệnh, trừ xe ưu tiên.","C":"Cả hai ý trên."},"answer":"A"},
{"num":51,"id":51,"q":"Người lái xe sử dụng đèn như thế nào khi đi trên các đoạn đường qua khu đông dân cư có hệ thống chiếu sáng đang hoạt động?","opts":{"A":"Chỉ bật đèn chiếu xa (đèn pha).","B":"Bật đèn chiếu xa (đèn pha) khi đường vắng, bật đèn chiếu gần (đèn cốt) khi có xe đi ngược chiều.","C":" Chỉ bật đèn chiếu gần (đèn cốt)."},"answer":"C"},
{"num":52,"id":52,"q":"Khi điều khiển phương tiện tham gia giao thông, hành vi nào sau đây bị cấm?","opts":{"A":" Dùng tay cầm và sử dụng điện thoại hoặc thiết bị điện tử khác.","B":"Chỉ được chở người trên thùng xe ô tô chở hàng trong trường hợp chở người đi làm nhiệm vụ cứu nạn, cứu hộ, phòng, chống thiên tai, dịch bệnh hoặc thực hiện nhiệm vụ khẩn cấp."},"answer":"A","danger":"true"},
{"num":53,"id":53,"q":"Người lái xe không được vượt xe khác khi gặp trường hợp nào dưới đây?","opts":{"A":" Trên cầu hẹp có một làn đường; nơi đường giao nhau, đường bộ giao nhau cùng mức với đường sắt; khi gặp xe ưu tiên.","B":"Trên cầu có từ 02 làn xe trở lên.","C":"Trên đường có 02 làn đường được phân chia làn bằng vạch kẻ nét đứt."},"answer":"A","danger":"true"},
{"num":54,"id":54,"q":"Nơi nào cấm quay đầu xe?","opts":{"A":"Ở phần đường dành cho người đi bộ qua đường, trên cầu, đầu cầu, gầm cầu vượt, ngầm.","B":"Tại nơi đường bộ giao nhau cùng mức với đường sắt, đường hẹp, đường dốc, đoạn đường cong tầm nhìn bị che khuất, trên đường cao tốc, trong hầm đường bộ, trên đường một chiều.","C":" Cả hai ý trên."},"answer":"C"},
{"num":55,"id":55,"q":"Người lái xe không được quay đầu xe trong các trường hợp nào dưới đây?","opts":{"A":" Ở phần đường dành cho người đi bộ qua đường, trên cầu, đầu cầu, trên đường cao tốc, tại nơi đường bộ giao nhau cùng mức với đường sắt, đường hẹp, đường dốc.","B":"Ở phía trước hoặc phía sau của phần đường dành cho người đi bộ qua đường, trên đường quốc lộ.","C":"Cả hai ý trên."},"answer":"A","danger":"true"},
{"num":56,"id":56,"q":"Trước khi cho xe chuyển hướng, người lái xe phải làm gì để bảo đảm an toàn giao thông?","opts":{"A":"Phải quan sát, bảo đảm khoảng cách an toàn với xe phía sau.","B":"Giảm tốc độ và có tín hiệu báo hướng rẽ.","C":"Chuyển dần sang làn gần nhất với hướng rẽ. Khi bảo đảm an toàn, không gây trở ngại cho người và phương tiện khác mới được chuyển hướng.","D":" Cả ba ý trên."},"answer":"D"},
{"num":57,"id":57,"q":"Khi chuyển làn đường, người lái xe phải bật đèn tín hiệu báo rẽ như thế nào là đúng quy tắc giao thông?","opts":{"A":"Khi bắt đầu chuyển làn đường.","B":" Trước khi thay đổi làn đường.","C":"Sau khi thay đổi làn đường."},"answer":"B"},
{"num":58,"id":58,"q":"Người lái xe không được lùi xe ở những khu vực nào dưới đây?","opts":{"A":"Ở đường một chiều, khu vực cấm dừng, trên phần đường dành cho người đi bộ qua đường.","B":"Nơi đường bộ giao nhau, đường bộ giao nhau cùng mức với đường sắt.","C":"Nơi tầm nhìn bị che khuất, trong hầm đường bộ, trên đường cao tốc.","D":" Cả ba ý trên."},"answer":"D","danger":"true"},
{"num":59,"id":59,"q":"Người điều khiển phương tiện tham gia giao thông không được dừng xe, đỗ xe ở những vị trí nào sau đây?","opts":{"A":"Trên miệng cống thoát nước, miệng hầm của đường điện thoại, điện cao thế, chỗ dành riêng cho xe chữa cháy lấy nước.","B":"Trong phạm vi an toàn của đường sắt.","C":" Cả hai ý trên."},"answer":"C"},
{"num":60,"id":60,"q":"Trên đường phố, người điều khiển phương tiện tham gia giao thông đường bộ được dừng xe, đỗ xe sát theo lề đường, vỉa hè phía bên phải theo chiều đi của mình; bánh xe gần nhất không được cách xa lề đường, vỉa hè không quá bao nhiêu mét trong các trường hợp dưới đây và không gây cản trở, nguy hiểm cho người và phương tiện tham gia giao thông đường bộ?","opts":{"A":" 0,25 mét.","B":"0,3 mét.","C":"0,4 mét.","D":"0,5 mét."},"answer":"A"},
{"num":61,"id":61,"q":"Khi dừng, đỗ xe trên đường phố hẹp, người lái xe ô tô phải dừng, đỗ xe ở vị trí cách xe ô tô đang đỗ ngược chiều khoảng cách tối thiểu là bao nhiêu mét trong các trường hợp dưới đây để bảo đảm an toàn?","opts":{"A":"10 mét.","B":"15 mét.","C":" 20 mét.","D":"25 mét."},"answer":"C"},
{"num":62,"id":62,"q":"Người điều khiển phương tiện tham gia giao thông đường bộ không được dừng xe, đỗ xe tại các vị trí nào sau đây?","opts":{"A":"Nơi có lề đường rộng hoặc khu đất ở bên ngoài phần đường xe chạy.","B":" Song song cùng chiều với một xe khác đang dừng, đỗ trên đường; trên đoạn đường cong hoặc gần đầu dốc mà tầm nhìn bị che khuất; bên trái đường một chiều.","C":"Cả hai ý trên."},"answer":"B"},
{"num":63,"id":63,"q":"Người điều khiển xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy có được phép sử dụng xe để kéo hoặc đẩy các phương tiện khác khi tham gia giao thông không?","opts":{"A":"Được phép.","B":"Nếu phương tiện được kéo, đẩy có khối lượng nhỏ hơn phương tiện của mình.","C":"Tùy trường hợp.","D":" Không được phép."},"answer":"D","danger":"true"},
{"num":64,"id":64,"q":"Khi điều khiển xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy, những hành vi nào sau đây không được phép?","opts":{"A":" Buông cả hai tay; đứng, nằm trên xe điều khiển xe; sử dụng chân chống hoặc vật khác quệt xuống đường khi xe đang chạy.","B":"Chở tối đa hai người phía sau khi chở người bệnh đi cấp cứu, áp giải người có hành vi vi phạm pháp luật, trẻ em dưới 12 tuổi và người già yếu hoặc người khuyết tật."},"answer":"A","danger":"true"},
{"num":65,"id":65,"q":"Khi điều khiển xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy, những hành vi nào sau đây không được phép?","opts":{"A":" Buông cả hai tay; sử dụng xe để kéo, đẩy xe khác, vật khác; sử dụng chân chống hoặc vật khác quệt xuống đường khi xe đang chạy.","B":"Sử dụng xe để chở người hoặc hàng hóa; để chân chạm xuống đất khi khởi hành.","C":"Đội mũ bảo hiểm; chạy xe đúng tốc độ quy định và chấp hành đúng quy tắc giao thông đường bộ.","D":"Chở người ngồi sau dưới 16 tuổi."},"answer":"A","danger":"true"},
{"num":66,"id":66,"q":"Người được chở trên xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy khi tham gia giao thông đường bộ không được thực hiện hành vi nào sau đây?","opts":{"A":"Mang, vác vật cồng kềnh.","B":"Bám, kéo hoặc đẩy các phương tiện khác.","C":"Dùng tay cầm điện thoại hoặc các thiết bị điện tử khác.","D":" Ý 1 và ý 2."},"answer":"D","danger":"true"},
{"num":67,"id":67,"q":"Người được chở trên xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy khi tham gia giao thông đường bộ có được bám, kéo hoặc đẩy các phương tiện khác không?","opts":{"A":"Được phép.","B":"Được bám trong trường hợp phương tiện của mình bị hỏng.","C":"Được kéo, đẩy trong trường hợp phương tiện khác bị hỏng.","D":" Không được phép."},"answer":"D","danger":"true"},
{"num":68,"id":68,"q":"Người lái xe, người được chở trên xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy phải thực hiện quy định nào dưới đây?","opts":{"A":" Đội mũ bảo hiểm theo đúng quy chuẩn kỹ thuật quốc gia và cài quai đúng quy cách.","B":"Người lái xe phải đội mũ bảo hiểm, người được chở trên xe không nhất thiết phải đội mũ bảo hiểm.","C":"Phải đội mũ bảo hiểm nhưng không nhất thiết phải cài quai."},"answer":"A","danger":"true"},
{"num":69,"id":69,"q":"Người lái xe mô tô hai bánh, xe gắn máy được phép chở tối đa hai người trong những trường hợp nào?","opts":{"A":" Chở người bệnh đi cấp cứu; áp giải người có hành vi vi phạm pháp luật; trẻ em dưới 12 tuổi; người già yếu hoặc người khuyết tật.","B":"Người đã uống rượu, bia; người trong cơ thể có chất ma tuý.","C":"Cả hai ý trên."},"answer":"A"},
{"num":70,"id":70,"q":"Người lái xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy không được thực hiện các hành vi nào dưới đây?","opts":{"A":"Đi xe dàn hàng ngang; buông cả hai tay.","B":"Sử dụng xe để kéo, đẩy xe khác, vật khác, dẫn dắt vật nuôi, mang, vác và chở vật cồng kềnh; chở người đứng trên xe, giá đèo hàng hoặc ngồi trên tay lái; xếp hàng hóa trên xe quá giới hạn quy định.","C":"Ngồi về một bên điều khiển xe; đứng, nằm trên xe điều khiển xe; thay người lái xe khi xe đang chạy; quay người về phía sau để điều khiển xe hoặc bịt mắt điều khiển xe; sử dụng chân chống hoặc vật khác quệt xuống đường khi xe đang chạy.","D":" Cả ba ý trên."},"answer":"D","danger":"true"},
{"num":71,"id":71,"q":"Người lái xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy không được thực hiện các hành vi nào sau đây?","opts":{"A":"Đi xe dàn hàng ngang; đi xe vào phần đường dành cho người đi bộ và phương tiện khác.","B":"Sử dụng ô, thiết bị âm thanh, trừ thiết bị trợ thính.","C":" Cả hai ý trên."},"answer":"C","danger":"true"},
{"num":72,"id":72,"q":"Người lái xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy không được thực hiện hành vi nào sau đây?","opts":{"A":"Đi trên phần đường, làn đường quy định, chấp hành hiệu lệnh của người điều khiển giao thông, đèn tín hiệu giao thông.","B":" Đi xe dàn hàng ngang, đi xe vào phần đường dành cho người đi bộ.","C":"Cả hai ý trên."},"answer":"B","danger":"true"},
{"num":73,"id":73,"q":"Người được chở trên xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy khi tham gia giao thông đường bộ có được sử dụng ô khi trời mưa hay không?","opts":{"A":"Được sử dụng.","B":"Chỉ người ngồi sau được sử dụng.","C":" Không được sử dụng.","D":"Được sử dụng nếu không có áo mưa."},"answer":"C","danger":"true"},
{"num":74,"id":74,"q":"Người được chở trên xe mô tô có được kéo theo người đang điều khiển xe đạp hay không?","opts":{"A":"Chỉ được phép nếu cả hai đội mũ bảo hiểm.","B":" Không được phép.","C":"Chỉ được thực hiện trên đường vắng."},"answer":"B","danger":"true"},
{"num":75,"id":75,"q":"Trường hợp người được chở trên xe mô tô, xe gắn máy, các loại xe tương tự xe mô tô và các loại xe tương tự xe gắn máy không đội \"mũ bảo hiểm cho người đi mô tô, xe máy\" hoặc không cài quai đúng quy cách (trừ trường hợp chở người bệnh đi cấp cứu, trẻ em dưới 06 tuổi, áp giải người có hành vi vi phạm pháp luật) thì việc xử phạt vi phạm hành chính được quy định như thế nào?","opts":{"A":"Không bị xử phạt chỉ bị nhắc nhở.","B":"Người được chở không bị xử phạt, chỉ xử phạt người điều khiển xe mô tô, xe gắn máy.","C":"Người được chở bị xử phạt, không xử phạt người điều khiển xe mô tô, xe gắn máy.","D":" Xử phạt cả người điều khiển và người được chở trên xe mô tô, xe gắn máy."},"answer":"D"},
{"num":76,"id":76,"q":"Trong các trường hợp dưới đây, để bảo đảm an toàn khi tham gia giao thông, người lái xe mô tô cần thực hiện như thế nào?","opts":{"A":" Phải đội mũ bảo hiểm theo đúng quy chuẩn kỹ thuật quốc gia và cài quai đúng quy cách, không sử dụng ô, điện thoại di động, thiết bị âm thanh (trừ thiết bị trợ thính).","B":"Phải đội mũ bảo hiểm khi trời mưa gió hoặc trời quá nắng; có thể sử dụng ô, điện thoại di động, thiết bị âm thanh nhưng phải bảo đảm an toàn.","C":"Phải đội mũ bảo hiểm khi cảm thấy mất an toàn giao thông hoặc khi chuẩn bị di chuyển quãng đường xa."},"answer":"A"},
{"num":77,"id":77,"q":"Thứ tự xuống phà như thế nào là đúng quy tắc giao thông?","opts":{"A":"Xe thô sơ, người đi bộ xuống trước, xe cơ giới, xe máy chuyên dùng xuống sau.","B":" Xe cơ giới, xe máy chuyên dùng xuống trước, xe thô sơ, người đi bộ xuống sau.","C":"Xe cơ giới, xe thô sơ xuống trước, xe máy chuyên dùng, người đi bộ xuống sau."},"answer":"B"},
{"num":78,"id":78,"q":"Trên đường có nhiều làn đường cho xe đi cùng chiều được phân biệt bằng vạch kẻ phân làn đường, người điều khiển phương tiện tham gia giao thông đường bộ phải cho xe đi như thế nào?","opts":{"A":"Cho xe đi trên bất kỳ làn đường nào hoặc giữa 02 làn đường nếu không có xe đi phía trước; khi cần thiết phải chuyển làn đường, người lái xe phải quan sát xe phía trước để bảo đảm an toàn.","B":" Phải cho xe đi trong một làn đường và chỉ được chuyển làn đường ở những nơi cho phép; mỗi lần chuyển làn đường chỉ được phép chuyển sang một làn đường liền kề; khi chuyển làn đường phải có tín hiệu báo trước; phải quan sát bảo đảm khoảng cách an toàn với xe phía trước, phía sau và hai bên mới được chuyển làn.","C":"Phải cho xe đi trong một làn đường, chỉ được chuyển làn đường khi vượt xe phía trước cùng làn đường."},"answer":"B"},
{"num":79,"id":79,"q":"Trên đường một chiều có vạch kẻ phân làn đường, xe thô sơ và xe cơ giới phải đi như thế nào là đúng quy tắc giao thông?","opts":{"A":"Xe thô sơ phải đi trên làn đường bên trái, xe cơ giới, xe máy chuyên dùng đi trên làn đường bên phải trong cùng.","B":" Xe thô sơ phải đi trên làn đường bên phải trong cùng, xe cơ giới, xe máy chuyên dùng đi trên làn đường bên trái.","C":"Xe thô sơ phải đi trên làn đường bên phải trong cùng, xe cơ giới, xe máy chuyên dùng được đi trên tất cả các làn đường."},"answer":"B"},
{"num":80,"id":80,"q":"Khi lái xe trong đô thị và khu đông dân cư trong thời gian từ 22 giờ ngày hôm trước đến 05 giờ ngày hôm sau, nếu cần vượt một xe khác, người lái xe phải báo hiệu như thế nào là đúng quy tắc giao thông?","opts":{"A":"Chỉ được báo hiệu bằng còi.","B":"Phải báo hiệu bằng cả còi và đèn.","C":" Chỉ được báo hiệu bằng đèn."},"answer":"C"},
{"num":81,"id":81,"q":"Khi điều khiển xe chạy trên đường, biết có xe sau xin vượt, nếu đủ điều kiện an toàn người điều khiển phương tiện phải làm gì?","opts":{"A":"Tăng tốc độ và ra hiệu cho xe sau vượt, không được gây trở ngại cho xe xin vượt.","B":" Giảm tốc độ, có tín hiệu rẽ phải để báo hiệu cho người điều khiển phương tiện tham gia giao thông đường bộ phía sau biết được vượt và đi sát về bên phải của phần đường xe chạy cho đến khi xe sau đã vượt qua, không được cản trở đối với xe xin vượt.","C":"Cho xe đi sát về bên trái của phần đường xe chạy và ra hiệu cho xe sau vượt, không được gây trở ngại cho xe xin vượt."},"answer":"B"},
{"num":82,"id":82,"q":"Khi điều khiển xe chạy trên đường, biết có xe sau xin vượt, nếu không đủ điều kiện an toàn người điều khiển phương tiện phải làm gì?","opts":{"A":" Có tín hiệu rẽ trái để báo hiệu cho người điều khiển phương tiện tham gia giao thông đường bộ phía sau biết là chưa được vượt.","B":"Tiếp tục đi cho đến khi đủ điều kiện an toàn, nếu xe sau vẫn xin vượt thì báo hiệu cho xe sau vượt.","C":"Tăng tốc độ để báo hiệu cho xe xin vượt biết là chưa được vượt."},"answer":"A"},
{"num":83,"id":83,"q":"Khi chuyển hướng, người lái xe, người điều khiển xe máy chuyên dùng phải làm gì để bảo đảm an toàn?","opts":{"A":" Phải nhường đường cho người đi bộ, xe thô sơ, xe đi ngược chiều và chỉ chuyển hướng khi không gây trở ngại hoặc nguy hiểm cho người, phương tiện khác.","B":"Nhanh chóng chuyển hướng để không gây trở ngại hoặc nguy hiểm cho người, phương tiện khác.","C":"Ra tín hiệu chuyển hướng để yêu cầu các phương tiện khác dừng lại cho xe chuyển hướng di chuyển."},"answer":"A"},
{"num":84,"id":84,"q":"Trước khi chuyển hướng, người điều khiển phương tiện tham gia giao thông đường bộ phải thực hiện như thế nào để bảo đảm an toàn?","opts":{"A":"Quan sát gương, nếu không có phương tiện gần hướng rẽ thì nhanh chóng chuyển hướng.","B":" Quan sát, bảo đảm khoảng cách an toàn với xe phía sau, giảm tốc độ và có tín hiệu báo hướng rẽ hoặc có tín hiệu bằng tay theo hướng rẽ đối với xe thô sơ không có đèn báo hướng rẽ, chuyển dần sang làn gần nhất với hướng rẽ. Tín hiệu báo hướng rẽ hoặc tín hiệu bằng tay phải sử dụng liên tục trong quá trình chuyển hướng. Khi bảo đảm an toàn, không gây trở ngại cho người và phương tiện khác mới được chuyển hướng.","C":"Quan sát gương, tăng tốc độ, ra tín hiệu và chuyển hướng."},"answer":"B"},
{"num":85,"id":85,"q":"Khi lùi xe, người điều khiển phương tiện tham gia giao thông đường bộ phải làm gì để bảo đảm an toàn?","opts":{"A":"Quan sát phía sau và cho lùi xe ở tốc độ chậm.","B":"Có tín hiệu báo lùi, nếu phía sau không có người hoặc phương tiện khác thì nhanh chóng lùi để bảo đảm an toàn.","C":" Phải quan sát hai bên và phía sau xe, có tín hiệu lùi và chỉ lùi xe khi bảo đảm an toàn."},"answer":"C","danger":"true"},
{"num":86,"id":86,"q":"Khi muốn lùi xe ở nơi có tầm nhìn bị che khuất, người lái xe phải xử lý như thế nào để đảm bảo an toàn?","opts":{"A":"Phải lùi thật chậm.","B":"Bấm còi 3 lần liên tiếp trước khi lùi.","C":" Không được lùi xe."},"answer":"C","danger":"true"},
{"num":87,"id":87,"q":"Trên đường không phân chia thành hai chiều xe chạy riêng biệt, người điều khiển phương tiện tham gia giao thông đường bộ phải tránh xe đi ngược chiều như thế nào để bảo đảm an toàn?","opts":{"A":" Giảm tốc độ và cho xe đi về bên phải theo chiều xe chạy của mình.","B":"Một trong hai xe phải dừng lại cho xe kia đi qua mới được đi.","C":"Tăng tốc độ, cho xe đi về bên phải theo chiều xe chạy của mình để nhanh chóng vượt qua."},"answer":"A","danger":"true"},
{"num":88,"id":88,"q":"Khi tránh xe đi ngược chiều, các xe phải nhường đường như thế nào là đúng quy tắc giao thông?","opts":{"A":"Nơi đường hẹp chỉ đủ cho một xe chạy và có chỗ tránh xe thì xe nào ở gần chỗ tránh hơn phải vào vị trí tránh, nhường đường cho xe đi ngược chiều.","B":"Xe xuống dốc phải nhường đường cho xe lên dốc.","C":"Xe có chướng ngại vật phía trước phải nhường đường cho xe không có chướng ngại vật phía trước.","D":" Cả ba ý trên."},"answer":"D","danger":"true"},
{"num":89,"id":89,"q":"Khi đang lái xe xuống dốc gặp một xe đang đi lên dốc, người lái xe phải làm gì?","opts":{"A":"Tiếp tục đi và phát tín hiệu cho xe lên dốc nhường đường cho xe bạn.","B":" Nhường đường cho xe lên dốc.","C":"Chỉ nhường đường khi xe lên dốc nháy đèn."},"answer":"B","danger":"true"},
{"num":90,"id":90,"q":"Người lái xe phải làm gì để bảo đảm an toàn khi lái xe trên đường cong có tầm nhìn bị hạn chế?","opts":{"A":" Quan sát, giảm tốc độ hoặc dừng lại để bảo đảm an toàn.","B":"Đi sang làn đường của xe ngược chiều để mở rộng tầm nhìn và vượt xe khác.","C":"Cho xe đi sát bên phải làn đường, bật tín hiệu báo hiệu để vượt bên phải xe khác."},"answer":"A","danger":"true"},
{"num":91,"id":91,"q":"Tại nơi đường giao nhau, người lái xe đang đi trên đường không ưu tiên, đường nhánh phải nhường đường như thế nào là đúng quy tắc giao thông?","opts":{"A":"Nhường đường cho xe đi ở bên phải mình tới.","B":"Nhường đường cho xe đi ở bên trái mình tới.","C":" Nhường đường cho xe đi trên đường ưu tiên hoặc đường chính từ bất kỳ hướng nào tới."},"answer":"C","danger":"true"},
{"num":92,"id":92,"q":"Tại nơi đường giao nhau có báo hiệu đi theo vòng xuyến, người lái xe phải nhường đường như thế nào là đúng quy tắc giao thông?","opts":{"A":"Nhường đường cho xe đi đến từ bên phải.","B":" Nhường đường cho xe đi đến từ bên trái.","C":"Không phải nhường đường."},"answer":"B","danger":"true"},
{"num":93,"id":93,"q":"Tại nơi đường giao nhau không có báo hiệu đi theo vòng xuyến, người điều khiển phương tiện phải nhường đường như thế nào là đúng quy tắc giao thông?","opts":{"A":" Phải nhường đường cho xe đi đến từ bên phải.","B":"Xe báo hiệu xin đường trước, xe đó được đi trước.","C":"Phải nhường đường cho xe đi đến từ bên trái."},"answer":"A","danger":"true"},
{"num":94,"id":94,"q":"Người lái xe phải nhanh chóng giảm tốc độ, đi sát lề đường bên phải hoặc dừng lại để nhường đường cho các loại xe nào dưới đây?","opts":{"A":"Xe chữa cháy của Cảnh sát phòng cháy, chữa cháy và cứu nạn, cứu hộ và xe chữa cháy của các lực lượng khác; xe của lực lượng quân sự, công an và kiểm sát; đoàn xe có xe Cảnh sát giao thông dẫn đường; xe cứu thương; xe hộ đê không có tín hiệu ưu tiên theo quy định.","B":" Xe ưu tiên gồm xe chữa cháy của Cảnh sát phòng cháy, chữa cháy và cứu nạn, cứu hộ và xe chữa cháy của các lực lượng khác được huy động đi làm nhiệm vụ chữa cháy; xe của lực lượng quân sự, công an và kiểm sát đi làm nhiệm vụ khẩn cấp; đoàn xe có xe Cảnh sát giao thông dẫn đường; xe cứu thương đi làm nhiệm vụ cấp cứu; xe hộ đê đi làm nhiệm vụ; xe đi làm nhiệm vụ cứu nạn, cứu hộ, khắc phục sự cố thiên tai, dịch bệnh hoặc xe đi làm nhiệm vụ trong tình trạng khẩn cấp theo quy định của pháp luật; đoàn xe tang.","C":"Xe ô tô, xe máy, đoàn xe đang diễu hành có tổ chức có báo tín hiệu xin vượt bằng còi và đèn."},"answer":"B"},
{"num":95,"id":95,"q":"Xe ưu tiên (trừ đoàn xe tang) tham gia giao thông đường bộ khi đi làm nhiệm vụ được quyền ưu tiên nào dưới đây?","opts":{"A":"Không bị hạn chế tốc độ.","B":"Được phép đi không phụ thuộc vào tín hiệu đèn giao thông, đi vào đường ngược chiều, các đường khác có thể đi được.","C":"Được đi ngược chiều trên làn dừng xe khẩn cấp trên đường cao tốc.","D":" Cả ba ý trên."},"answer":"D"},
{"num":96,"id":96,"q":"Khi có tín hiệu của xe ưu tiên, người và phương tiện tham gia giao thông đường bộ phải tuân thủ quy định nào dưới đây?","opts":{"A":" Giảm tốc độ, đi sát lề đường bên phải hoặc dừng lại để nhường đường.","B":"Tăng tốc độ và đi sát lề đường bên phải để nhường đường.","C":"Giảm tốc độ, đi sát lề đường bên trái để nhường đường."},"answer":"A"},
{"num":97,"id":97,"q":"Khi đang lái xe, phía trước có một xe Cảnh sát giao thông không phát tín hiệu ưu tiên, người lái xe có được phép vượt hay không?","opts":{"A":"Không được vượt.","B":"Được phép vượt ở phần đường dành cho người đi bộ qua đường.","C":" Được vượt khi bảo đảm an toàn."},"answer":"C","danger":"true"},
{"num":98,"id":98,"q":"Khi đang lái xe, phía trước có một xe cứu thương đang phát tín hiệu ưu tiên, người lái xe có được phép vượt hay không?","opts":{"A":" Không được vượt.","B":"Được vượt khi đang đi trên cầu.","C":"Được phép vượt khi đi qua nơi giao nhau có ít phương tiện cùng tham gia giao thông.","D":"Được vượt khi bảo đảm an toàn."},"answer":"A","danger":"true"},
{"num":99,"id":99,"q":"Khi tới đường ngang không có người gác, chắn đường bộ, chuông, đèn tín hiệu, người tham gia giao thông đường bộ phải làm gì để bảo đảm an toàn?","opts":{"A":" Dừng lại về bên phải đường của mình, trước vạch dừng xe và quan sát hai phía, khi không có phương tiện giao thông đường sắt tới mới được đi qua.","B":"Quan sát hai phía, khi không có phương tiện giao thông đường sắt tới thì nhanh chóng đi qua.","C":"Dừng lại khoảng cách tối thiểu 3 mét tính từ ray đường sắt gần nhất, khi không có phương tiện giao thông đường sắt tới thì nhanh chóng đi qua."},"answer":"A"},
{"num":100,"id":100,"q":"Tại đường ngang, cầu chung đường sắt, khi có hiệu lệnh của nhân viên gác chắn, đèn đỏ sáng nhấp nháy, chuông kêu, chắn đường bộ đang dịch chuyển hoặc đã đóng, người tham gia giao thông đường bộ phải làm gì để bảo đảm an toàn?","opts":{"A":"Dừng lại về bên trái đường của mình, trước vạch dừng xe.","B":"Dừng lại giữa đường của mình, trước vạch dừng xe.","C":" Dừng lại về bên phải đường của mình, trước vạch dừng xe."},"answer":"C"},
{"num":101,"id":101,"q":"Khi xe ô tô bị hư hỏng, bị tai nạn trên đường ngang, cầu chung đường sắt mà không thể di chuyển ngay khỏi phạm vi an toàn đường sắt, người lái xe và người có mặt xử lý như thế nào là đúng quy định?","opts":{"A":" Người lái xe và người có mặt phải ngay lập tức báo hiệu để dừng tàu, thực hiện các biện pháp bảo đảm an toàn.","B":"Để xe lại, tìm cách báo cho người quản lý đường sắt, nhà ga nơi gần nhất.","C":"Không di chuyển phương tiện, tự khắc phục sửa chữa."},"answer":"A"},
{"num":102,"id":102,"q":"Người tham gia giao thông đường bộ phải dừng lại về bên phải đường của mình trước vạch dừng xe tại đường ngang, cầu chung đường sắt khi có báo hiệu nào dưới đây?","opts":{"A":"Hiệu lệnh của nhân viên gác chắn.","B":"Đèn đỏ sáng nhấp nháy, chuông kêu.","C":"Chắn đường bộ đang dịch chuyển hoặc đã đóng.","D":" Cả ba ý trên."},"answer":"D","danger":"true"},
{"num":103,"id":103,"q":"Người điều khiển phương tiện tham gia giao thông trong hầm đường bộ ngoài việc phải tuân thủ các quy tắc giao thông còn phải thực hiện những quy định nào dưới đây?","opts":{"A":" Xe cơ giới, xe máy chuyên dùng phải bật đèn chiếu gần; xe thô sơ phải bật đèn hoặc có vật phát sáng báo hiệu; không dừng xe, đỗ xe trong hầm đường bộ; trường hợp gặp sự cố kỹ thuật hoặc bất khả kháng khác buộc phải dừng xe, đỗ xe, người lái xe, người điều khiển xe máy chuyên dùng phải đưa xe vào vị trí dừng xe, đỗ xe khẩn cấp, nếu không di chuyển được, phải có báo hiệu bằng đèn khẩn cấp và đặt biển hoặc đèn cảnh báo về phía sau xe khoảng cách bảo đảm an toàn.","B":"Xe cơ giới, xe máy chuyên dùng phải bật đèn chiếu xa; được dừng xe, đỗ xe khi cần thiết.","C":"Phải cho xe chạy trên một làn đường và chỉ chuyển làn ở nơi được phép; được quay đầu xe, lùi xe khi cần thiết."},"answer":"A"},
{"num":104,"id":104,"q":"Việc nối giữa xe kéo với xe được kéo trong trường hợp hệ thống hãm của xe được kéo không còn hiệu lực thì xe kéo nhau phải nối bằng cách nào?","opts":{"A":"Nối bằng dây cáp có độ dài 6 mét.","B":"Nối bằng dây cáp có độ dài 8 mét.","C":" Nối bằng thanh nối cứng."},"answer":"C"},
{"num":105,"id":105,"q":"Xe kéo rơ moóc, xe ô tô đầu kéo khi tham gia giao thông đường bộ phải tuân thủ quy tắc giao thông nào ghi ở dưới đây?","opts":{"A":" Chỉ được kéo rơ moóc, sơ mi rơ moóc phù hợp với thiết kế của xe; việc kết nối xe kéo với rơ moóc, xe ô tô đầu kéo với sơ mi rơ moóc phải bảo đảm chắc chắn, an toàn.","B":"Phải có tổng trọng lượng tương đương tổng trọng lượng của rơ moóc hoặc phải có hệ thống hãm có hiệu lực cho rơ moóc.","C":"Phải được lắp phanh phụ theo quy định để đảm bảo an toàn."},"answer":"A"},
{"num":106,"id":106,"q":"Luật Trật tự, an toàn giao thông đường bộ quy định về xe kéo xe, xe kéo rơ moóc và xe ô tô đầu kéo kéo sơ mi rơ moóc như thế nào dưới đây?","opts":{"A":"Một xe ô tô được kéo theo nhiều xe ô tô hoặc xe máy chuyên dùng khác khi xe được kéo không tự chạy được (trừ trường hợp xe vận chuyển hàng siêu trường, siêu trọng).","B":" Xe được kéo phải có người điều khiển và hệ thống lái của xe đó phải còn hiệu lực; việc nối xe kéo với xe được kéo phải bảo đảm chắc chắn, an toàn; trường hợp hệ thống hãm của xe được kéo không còn hiệu lực thì xe kéo nhau phải nối bằng thanh nối cứng. Phía trước của xe kéo và phía sau của xe được kéo phải có biển báo hiệu, có đèn cảnh báo nhấp nháy màu vàng.","C":"Cả hai ý trên."},"answer":"B"},
{"num":107,"id":107,"q":"Người điều khiển phương tiện tham gia giao thông đường bộ phải quan sát, giảm tốc độ hoặc dừng lại để bảo đảm an toàn trong các trường hợp nào dưới đây?","opts":{"A":"Có báo hiệu cảnh báo nguy hiểm hoặc có chướng ngại vật trên đường; chuyển hướng xe chạy hoặc tầm nhìn bị hạn chế.","B":"Nơi cầu, cống hẹp, đập tràn, đường ngầm, hầm chui, hầm đường bộ; có vật nuôi đi trên đường hoặc chăn thả ở ven đường.","C":"Điểm dừng xe, đỗ xe trên đường bộ có khách đang lên, xuống xe.","D":" Cả ba ý trên."},"answer":"D"},
{"num":108,"id":108,"q":"Trên đường mà mỗi chiều đường xe chạy chỉ có một làn đường dành cho xe cơ giới, người lái xe không được vượt xe khác trong trường hợp nào dưới đây?","opts":{"A":" Có chướng ngại vật phía trước, xe chạy phía trước có tín hiệu vượt xe khác.","B":"Xe chạy phía trước đã có tín hiệu rẽ phải và tránh về bên phải.","C":"Cả hai ý trên."},"answer":"A"},
{"num":109,"id":109,"q":"Người lái xe được phép vượt xe khác về bên phải trong trường hợp nào dưới đây?","opts":{"A":" Xe phía trước có tín hiệu rẽ trái hoặc đang rẽ trái hoặc khi xe chuyên dùng đang làm việc trên đường mà không thể vượt bên trái.","B":"Xe phía trước đang đi sát lề đường bên trái.","C":"Cả hai ý trên."},"answer":"A"},
{"num":110,"id":110,"q":"Khi có xe xin vượt, người lái xe mô tô xử lý như thế nào nếu đủ điều kiện an toàn cho xe phía sau vượt?","opts":{"A":" Giảm tốc độ, có tín hiệu rẽ phải để báo hiệu cho người điều khiển phương tiện tham gia giao thông đường bộ phía sau biết được vượt và đi sát về bên phải của phần đường xe chạy cho đến khi xe sau đã vượt qua, không được cản trở đối với xe xin vượt.","B":"Lái xe vào lề đường bên trái và giảm tốc độ để xe phía sau vượt qua, không được gây trở ngại đối với xe xin vượt.","C":"Tăng tốc độ, đi sát về bên phải của phần đường xe chạy cho đến khi xe sau đã vượt qua."},"answer":"A"},

{"num":138,"id":138,"q":"Khi tham gia giao thông đường bộ, người lái xe phải mang theo các giấy tờ gì?","opts":{"A":"Chứng nhận đăng ký xe hoặc bản sao Chứng nhận đăng ký xe có chứng thực kèm bản gốc giấy tờ xác nhận của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài còn hiệu lực trong trường hợp xe đang được thế chấp tại tổ chức tín dụng, chi nhánh ngân hàng nước ngoài.","B":"Giấy phép lái xe phù hợp với loại xe đang điều khiển; chứng nhận kiểm định an toàn kỹ thuật và bảo vệ môi trường đối với xe cơ giới theo quy định của pháp luật; chứng nhận bảo hiểm bắt buộc trách nhiệm dân sự của chủ xe cơ giới.","C":"Trường hợp các giấy tờ nêu trên đã được tích hợp vào tài khoản định danh điện tử thì việc xuất trình, kiểm tra có thể thực hiện thông qua tài khoản định danh điện tử.","D":" Cả ba ý trên."},"answer":"D"},
{"num":139,"id":139,"q":"Giấy phép lái xe bị thu hồi trong các trường hợp nào sau đây?","opts":{"A":"Người được cấp giấy phép lái xe không đủ điều kiện sức khỏe theo kết luận của cơ sở khám bệnh, chữa bệnh đối với từng hạng giấy phép lái xe.","B":"Giấy phép lái xe được cấp sai quy định.","C":"Giấy phép lái xe đã quá thời hạn tạm giữ hoặc hết thời hiệu thi hành quyết định xử phạt vi phạm hành chính theo quy định của pháp luật về xử lý vi phạm hành chính nếu người vi phạm không đến nhận mà không có lý do chính đáng.","D":" Cả ba ý trên."},"answer":"D"},
{"num":140,"id":140,"q":"Người có giấy phép lái xe chưa bị trừ hết 12 điểm, được phục hồi điểm giấy phép lái xe trong trường hợp nào sau đây?","opts":{"A":"Không được phục hồi.","B":" Được phục hồi đủ 12 điểm, nếu không bị trừ điểm trong thời hạn 12 tháng từ ngày bị trừ điểm gần nhất."},"answer":"B"},
