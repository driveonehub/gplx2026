{"num":158,"id":158,"q":"Khi tham gia giao thông trên đoạn đường không có biển báo \"Cự ly tối thiểu giữa hai xe\", trong điều kiện mặt đường khô ráo, không có sương mù, mặt đường không trơn trượt, địa hình bằng phẳng, đường thẳng, tầm nhìn bảo đảm, xe cơ giới đang chạy với tốc độ từ trên 80 km/h đến 100 km/h, người lái xe phải giữ khoảng cách an toàn với xe đang chạy liền trước tối thiểu là bao nhiêu?","opts":{"A":"35 m.","B":"55 m.","C":" 70 m."},"answer":"C"},
{"num":159,"id":159,"q":"Khi tham gia giao thông trên đoạn đường không có biển báo \"cự ly tối thiểu giữa hai xe\", trong điều kiện mặt đường khô ráo, không có sương mù, mặt đường không trơn trượt, địa hình bằng phẳng, đường thẳng, tầm nhìn bảo đảm, xe cơ giới đang chạy với tốc độ từ trên 100 km/h đến 120 km/h, người lái xe phải giữ khoảng cách an toàn với xe đang chạy liền trước tối thiểu là bao nhiêu?","opts":{"A":"55 m.","B":"70 m.","C":" 100 m."},"answer":"C"},
{"num":160,"id":160,"q":"Khi tham gia giao thông trên đoạn đường không có biển báo \"cự ly tối thiểu giữa hai xe\", trong điều kiện mặt đường khô ráo, không có sương mù, mặt đường không trơn trượt, địa hình bằng phẳng, đường thẳng, tầm nhìn bảo đảm, xe cơ giới đang chạy với tốc độ từ trên 60 km/h đến 80 km/h, người lái xe phải giữ khoảng cách an toàn với xe đang chạy liền trước tối thiểu là bao nhiêu?","opts":{"A":" 55 m.","B":"70 m.","C":"100 m."},"answer":"A"},
{"num":161,"id":161,"q":"Khi tham gia giao thông trên đoạn đường không có biển báo \"cự ly tối thiểu giữa hai xe\", trong điều kiện mặt đường khô ráo, không có sương mù, mặt đường không trơn trượt, địa hình bằng phẳng, đường thẳng, tầm nhìn bảo đảm, xe cơ giới đang chạy với tốc độ 60 km/h, người lái xe phải giữ khoảng cách an toàn với xe đang chạy liền trước tối thiểu là bao nhiêu?","opts":{"A":" 35 m.","B":"55 m.","C":"70 m."},"answer":"A"},
{"num":162,"id":162,"q":"Khi điều khiển xe chạy với tốc độ dưới 60 km/h, để bảo đảm khoảng cách an toàn giữa hai xe, người lái xe phải điều khiển xe như thế nào?","opts":{"A":"Chủ động giữ khoảng cách an toàn phù hợp với xe chạy liền trước xe của mình.","B":"Bảo đảm khoảng cách an toàn tùy thuộc vào mật độ phương tiện, tình hình giao thông thực tế.","C":" Cả hai ý trên."},"answer":"C"},
{"num":163,"id":163,"q":"Người lái xe phải giảm tốc độ thấp hơn tốc độ tối đa cho phép đến mức cần thiết, chú ý quan sát và chuẩn bị sẵn sàng những tình huống có thể xảy ra để phòng ngừa tai nạn trong các trường hợp nào dưới đây?","opts":{"A":" Gặp biển báo nguy hiểm và cảnh báo trên đường.","B":"Gặp biển chỉ dẫn trên đường.","C":"Gặp biển báo hết mọi lệnh cấm.","D":"Gặp biển báo hết hạn chế tốc độ tối đa cho phép."},"answer":"A","danger":"true"},
{"num":164,"id":164,"q":"Xe đưa đón trẻ em mầm non, học sinh được ưu tiên gì khi tham gia giao thông đường bộ?","opts":{"A":" Tổ chức phân luồng, điều tiết giao thông, bố trí nơi dừng xe, đỗ xe tại khu vực trường học và tại các điểm trên lộ trình đưa đón trẻ em mầm non, học sinh.","B":"Được bố trí xe dẫn đường để bảo đảm an toàn giao thông.","C":"Cả hai ý trên."},"answer":"A"},
{"num":165,"id":165,"q":"Người điều khiển phương tiện tham gia giao thông đường bộ phải quan sát, giảm tốc độ hoặc dừng lại để bảo đảm an toàn trong các trường hợp nào dưới đây?","opts":{"A":"Tại nơi có vạch kẻ đường hoặc báo hiệu khác dành cho người đi bộ hoặc tại nơi mà người đi bộ, xe lăn của người khuyết tật đang qua đường.","B":"Nơi đường bộ giao nhau cùng mức với đường bộ, đường bộ giao nhau cùng mức với đường sắt; đường hẹp, đường vòng, đường quanh co, đường đèo, dốc.","C":"Khu vực có trường học, bệnh viện, bến xe, công trình công cộng tập trung đông người, khu vực đông dân cư, chợ, khu vực đang thi công trên đường bộ, hiện trường vụ tai nạn giao thông đường bộ.","D":" Cả ba ý trên."},"answer":"D","danger":"true"},
{"num":166,"id":166,"q":"Tại những đoạn đường không bố trí biển báo hạn chế tốc độ, không bố trí biển báo khoảng cách an toàn tối thiểu giữa hai xe, người lái xe phải thực hiện quy định nào dưới đây để bảo đảm an toàn?","opts":{"A":"Được phép lái xe không hạn chế tốc độ và khoảng cách an toàn tối thiểu với xe phía trước cùng làn đường hoặc phần đường.","B":"Được phép lái xe không hạn chế tốc độ và khoảng cách an toàn tối thiểu với xe phía trước cùng làn đường hoặc phần đường khi tham gia giao thông trên đường nhánh.","C":" Chấp hành quy định về tốc độ, khoảng cách an toàn tối thiểu với xe phía trước cùng làn đường hoặc phần đường."},"answer":"C"},
{"num":167,"id":167,"q":"Khi gặp xe buýt đang dừng đón, trả khách, người điều khiển xe mô tô phải xử lý như thế nào dưới đây?","opts":{"A":"Tăng tốc độ để nhanh chóng vượt qua xe buýt.","B":" Quan sát, giảm tốc độ đi qua xe buýt hoặc dừng lại để bảo đảm an toàn."},"answer":"B","danger":"true"},
{"num":168,"id":168,"q":"Việc vận chuyển hành khách bằng xe ô tô phải tuân thủ các quy định nào dưới đây?","opts":{"A":" Đón, trả hành khách đúng nơi quy định; hướng dẫn sử dụng trang thiết bị an toàn trên xe; có biện pháp giữ gìn vệ sinh trong xe; vận chuyển hành khách đúng lịch trình, lộ trình đã đăng ký, trừ trường hợp bất khả kháng; không chở hành khách trên nóc xe, trong khoang chở hành lý hoặc để hành khách đu, bám bên ngoài xe.","B":"Đón, trả hành khách theo yêu cầu của hành khách trên xe; hướng dẫn sử dụng trang thiết bị an toàn trên xe; có biện pháp giữ gìn vệ sinh trong xe; vận chuyển hành khách đúng lịch trình, lộ trình đã đăng ký, trừ trường hợp bất khả kháng; không chở hành khách trên nóc xe, trong khoang chở hành lý hoặc để hành khách đu, bám bên ngoài xe."},"answer":"A"},
{"num":169,"id":169,"q":"Trong hoạt động vận tải đường bộ, các hành vi nào dưới đây bị nghiêm cấm?","opts":{"A":"Vận chuyển hàng hóa cấm lưu hành.","B":"Vận chuyển trái phép hoặc không thực hiện đầy đủ các quy định của pháp luật về vận chuyển hàng hóa nguy hiểm.","C":"Vận chuyển động vật hoang dã.","D":" Cả ba ý trên."},"answer":"D"},
{"num":170,"id":170,"q":"Trong hoạt động vận tải hành khách, những hành vi nào dưới đây bị nghiêm cấm?","opts":{"A":"Cạnh tranh nhau nhằm tăng lợi nhuận.","B":"Giảm giá để thu hút khách.","C":" Đe dọa, xúc phạm, tranh giành, lôi kéo hành khách; đe doạ, cưỡng ép hành khách sử dụng dịch vụ ngoài ý muốn; chuyển tải, xuống khách hoặc các hành vi khác nhằm trốn tránh phát hiện xe chở quá tải, quá số người theo quy định của pháp luật.","D":"Cả ba ý trên."},"answer":"C"},
{"num":171,"id":171,"q":"Thời gian lái xe liên tục của người lái xe ô tô kinh doanh vận tải được quy định như thế nào để bảo đảm an toàn giao thông?","opts":{"A":" Không quá 4 giờ.","B":"Không quá 6 giờ.","C":"Không quá 8 giờ.","D":"Liên tục tùy thuộc vào sức khỏe và khả năng của người lái xe."},"answer":"A"},
{"num":172,"id":172,"q":"Thời gian làm việc của người lái xe ô tô kinh doanh vận tải trong một ngày được quy định như thế nào để bảo đảm an toàn giao thông?","opts":{"A":"Không quá 6 giờ trong một ngày.","B":"Không quá 8 giờ trong một ngày.","C":" Không quá 10 giờ trong một ngày.","D":"Không hạn chế tùy thuộc vào sức khỏe và khả năng của người lái xe."},"answer":"C"},
{"num":173,"id":173,"q":"Trước khi xe khởi hành, người lái xe, nhân viên phục vụ trên xe ô tô vận chuyển hành khách có trách nhiệm nào sau đây?","opts":{"A":"Kiểm tra các điều kiện bảo đảm an toàn của xe.","B":"Hướng dẫn cho hành khách về an toàn giao thông đường bộ và thoát hiểm khi gặp sự cố.","C":"Kiểm tra nhân thân và hành lý của hành khách đi xe.","D":" Ý 1 và ý 2."},"answer":"D"},
{"num":174,"id":174,"q":"Xe ô tô kinh doanh vận tải chở trẻ em mầm non, học sinh phải đáp ứng các yêu cầu nào dưới đây?","opts":{"A":"Có thiết bị ghi nhận hình ảnh trẻ em mầm non, học sinh và thiết bị có chức năng cảnh báo, chống bỏ quên trẻ em trên xe; có niên hạn sử dụng không quá 20 năm; có màu sơn theo quy định của Chính phủ.","B":"Có dây đai an toàn phù hợp với lứa tuổi hoặc sử dụng xe có ghế ngồi phù hợp với lứa tuổi theo quy định của pháp luật.","C":"Được cấp chứng nhận đăng kí xe và gắn biển số xe, bảo đảm an toàn kĩ thuật và bảo vệ môi trường theo quy định của pháp luật; xe ô tô chở người từ 08 chỗ trở lên (không kể chỗ của người lái xe) phải lắp thiết bị giám sát hành trình và thiết bị ghi nhận hình ảnh người lái xe.","D":" Cả ba ý trên."},"answer":"D"},
{"num":175,"id":175,"q":"Việc vận chuyển động vật sống khi tham gia giao thông đường bộ phải thực hiện các yêu cầu nào dưới đây?","opts":{"A":"Người lái xe phải mang đủ giấy tờ theo quy định của pháp luật.","B":"Phương tiện vận chuyển phải có kết cấu phù hợp với loại động vật chuyên chở.","C":"Trong quá trình vận chuyển phải chấp hành các quy định của pháp luật về trật tự, an toàn giao thông đường bộ, vệ sinh dịch tễ, phòng dịch và bảo đảm vệ sinh môi trường.","D":" Cả ba ý trên."},"answer":"D"},
{"num":176,"id":176,"q":"Việc vận chuyển hàng hóa nguy hiểm khi tham gia giao thông đường bộ phải chấp hành các quy định nào dưới đây?","opts":{"A":" Phải có giấy phép vận chuyển; trong trường hợp cần thiết, đơn vị vận chuyển hàng hoá nguy hiểm phải bố trí người áp tải để bảo đảm trật tự, an toàn giao thông đường bộ.","B":"Phải có giấy phép vận chuyển; không phải bố trí người áp tải khi tham gia giao thông đường bộ."},"answer":"A"},
{"num":177,"id":177,"q":"Việc lưu hành xe ô tô của người nước ngoài đăng ký tại nước ngoài có tay lái ở bên phải tham gia giao thông tại Việt Nam, xe cơ giới nước ngoài do người nước ngoài đưa vào Việt Nam du lịch được quy định như như thế nào?","opts":{"A":"Phải chấp hành quy định của pháp luật về trật tự, an toàn giao thông đường bộ của Việt Nam. Trường hợp điều ước quốc tế mà nước Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên có quy định khác thì áp dụng theo điều ước quốc tế đó.","B":"Tham gia giao thông đúng trong phạm vi, tuyến đường, thời gian đã được cơ quan có thẩm quyền của Việt Nam cấp phép.","C":"Xe ô tô của người nước ngoài đăng ký tại nước ngoài có tay lái ở bên phải phải đi theo đoàn và có người, phương tiện hỗ trợ, hướng dẫn giao thông.","D":" Cả ba ý trên."},"answer":"D"},
{"num":178,"id":178,"q":"Việc sử dụng xe mô tô, xe gắn máy, xe thô sơ để vận chuyển hành khách, hàng hóa phải thực hiện các quy định nào dưới đây để đảm bảo an toàn giao thông?","opts":{"A":"Kiểm tra điều kiện bảo đảm an toàn của xe trước khi tham gia giao thông đường bộ; mang đủ giấy tờ theo quy định của pháp luật.","B":"Kiểm tra việc sắp xếp hàng hóa bảo đảm an toàn; không chở quá số người, chở hành lý, hàng hoá vượt quá khối lượng cho phép hoặc vượt quá khổ giới hạn của xe.","C":" Cả hai ý trên."},"answer":"C"},
{"num":179,"id":179,"q":"Xe vận chuyển hàng siêu trường, siêu trọng phải thực hiện các quy định nào dưới đây để bảo đảm an toàn giao thông?","opts":{"A":" Phải chạy với tốc độ quy định trong giấy phép và phải có báo hiệu kích thước của hàng; trường hợp cần thiết, phải có người, phương tiện hỗ trợ lái xe, cảnh báo cho người, phương tiện tham gia giao thông đường bộ khác và thực hiện các biện pháp bảo đảm an toàn giao thông khi vận chuyển hàng siêu trường, siêu trọng trên đường bộ.","B":"Phải chạy với tốc độ quy định trong giấy phép; phải có người, phương tiện hỗ trợ lái xe, cảnh báo cho người, phương tiện tham gia giao thông đường bộ khác và thực hiện các biện pháp bảo đảm an toàn giao thông khi vận chuyển hàng siêu trường, siêu trọng trên đường dành cho giao thông công cộng."},"answer":"A"},
{"num":180,"id":180,"q":"Xe cứu hộ giao thông đường bộ cần thực hiện yêu cầu nào sau đây để bảo đảm trật tự an toàn giao thông?","opts":{"A":"Xe cứu hộ giao thông đường bộ phải có dấu hiệu nhận diện, niêm yết thông tin trên xe, gắn thiết bị giám sát hành trình và thiết bị ghi nhận hình ảnh người lái xe.","B":"Phải tuân thủ quy định của pháp luật về khối lượng hàng hóa chuyên chở của xe cứu hộ và khối lượng của xe được cứu hộ ghi trên Chứng nhận kiểm định an toàn kỹ thuật và bảo vệ môi trường.","C":" Cả hai ý trên."},"answer":"C"}
]}, 


{"id": "phan-2", "title": "Đạo đức", "count": 25, "questions": [
{"num":181,"id":181,"q":"Người lái xe kinh doanh vận tải khi thực hiện tốt việc rèn luyện, nâng cao trách nhiệm, đạo đức nghề nghiệp sẽ thu được kết quả như thế nào dưới đây?","opts":{"A":" Được khách hàng, xã hội tôn trọng; được đồng nghiệp quý mến, giúp đỡ; được doanh nghiệp tin dùng và đóng góp nhiều cho xã hội; thu hút được khách hàng, góp phần quan trọng trong xây dựng thương hiệu, kinh doanh có hiệu quả cao.","B":"Được cộng điểm vào giấy phép lái xe.","C":"Cả hai ý trên."},"answer":"A"},
{"num":182,"id":182,"q":"Những hành vi nào sau đây thể hiện là người có văn hóa giao thông?","opts":{"A":" Luôn tuân thủ pháp luật về trật tự, an toàn giao thông đường bộ, nhường nhịn và giúp đỡ người khác.","B":"Đi nhanh, vượt đèn đỏ nếu không có lực lượng Công an.","C":"Bấm còi và nháy đèn liên tục để cảnh báo xe khác.","D":"Tránh nhường đường để đi nhanh hơn."},"answer":"A"},
{"num":183,"id":183,"q":"Người lái xe kinh doanh vận tải cần thực hiện những công việc gì ghi ở dưới đây để thường xuyên rèn luyện nâng cao đạo đức nghề nghiệp?","opts":{"A":"Quản lý và sử dụng xe tốt; bảo dưỡng xe đúng định kỳ; thực hành tiết kiệm vật tư, nhiên liệu; luôn tu dưỡng bản thân, có lối sống lành mạnh, tác phong làm việc công nghiệp.","B":"Nắm vững và tự giác chấp hành các quy định của pháp luật về trật tự, an toàn giao thông đường bộ, lái xe an toàn; thực hiện đầy đủ trách nhiệm với khách hàng; có ý thức tổ chức kỷ luật và xây dựng doanh nghiệp vững mạnh; có tinh thần hợp tác, tương trợ, giúp đỡ đồng nghiệp.","C":" Cả hai ý trên."},"answer":"C"},
{"num":184,"id":184,"q":"Người lái xe ô tô vận chuyển hành khách phải có những phẩm chất, đạo đức nghề nghiệp gì dưới đây?","opts":{"A":"Phải có thái độ lịch sự, tôn trọng, thân mật với hành khách; giúp đỡ những người có hoàn cảnh khó khăn, người già, người khuyết tật, phụ nữ có thai, có con nhỏ và trẻ em.","B":"Luôn tu dưỡng bản thân, có lối sống lành mạnh, khiêm tốn, có tác phong làm việc công nghiệp, không tham gia vào các tệ nạn xã hội; tôn trọng người cùng tham gia giao thông đường bộ và có ý thức bảo vệ môi trường.","C":" Cả hai ý trên."},"answer":"C"},
{"num":185,"id":185,"q":"Khái niệm về văn hóa giao thông được hiểu như thế nào là đúng?","opts":{"A":"Là sự hiểu biết và chấp hành nghiêm chỉnh pháp luật về giao thông, là ý thức trách nhiệm với cộng đồng khi tham gia giao thông.","B":"Là sự tôn trọng, nhường nhịn, giúp đỡ và ứng xử có văn hóa giữa những người tham gia giao thông với nhau.","C":" Cả hai ý trên."},"answer":"C"},
{"num":186,"id":186,"q":"Trên làn đường dành cho ô tô có vũng nước lớn, người lái xe ô tô bắt buộc phải đi qua vũng nước, trên làn đường bên cạnh có nhiều người đang lái xe mô tô tham gia giao thông, người lái xe ô tô xử lý như thế nào khi lái xe qua vũng nước là có văn hóa giao thông?","opts":{"A":"Cho xe chạy thật nhanh qua vũng nước.","B":" Giảm tốc độ cho xe chạy chậm qua vũng nước.","C":"Giảm tốc độ cho xe chạy qua làn đường dành cho mô tô để tránh vũng nước."},"answer":"B"},
{"num":187,"id":187,"q":"Người lái xe không điều khiển xe đi đúng làn đường quy định, phóng nhanh, vượt ẩu, vượt đèn đỏ, đi vào đường cấm được coi là hành vi nào trong các hành vi dưới đây?","opts":{"A":" Là thiếu văn hóa giao thông, vi phạm pháp luật về trật tự, an toàn giao thông đường bộ.","B":"Là thiếu văn hóa giao thông."},"answer":"A"},
{"num":188,"id":188,"q":"Khi sơ cứu người bị tai nạn giao thông đường bộ, có vết thương chảy máu ngoài, phun thành tia và phun mạnh khi mạch đập, bạn phải làm gì dưới đây?","opts":{"A":"Thực hiện cầm máu trực tiếp.","B":" Thực hiện cầm máu không trực tiếp (chặn động mạch)."},"answer":"B"},
{"num":189,"id":189,"q":"Người lái xe có văn hóa giao thông khi tham gia giao thông đường bộ phải đáp ứng các điều kiện nào dưới đây?","opts":{"A":" Hiểu biết và chấp hành nghiêm chỉnh pháp luật về giao thông đường bộ; có ý thức trách nhiệm với cộng đồng khi tham gia giao thông; tôn trọng, nhường nhịn, giúp đỡ và ứng xử có văn hóa với những người cùng tham gia giao thông.","B":"Điều khiển xe vượt quá tốc độ, đi không đúng làn đường."},"answer":"A"},
{"num":190,"id":190,"q":"Người lái xe có văn hóa giao thông khi tham gia giao thông phải tuân thủ những quy định nào dưới đây?","opts":{"A":"Điều khiển xe đi trên phần đường, làn đường có ít phương tiện tham gia giao thông, chỉ đội mũ bảo hiểm ở nơi có biển báo bắt buộc đội mũ bảo hiểm.","B":" Chấp hành hiệu lệnh, chỉ dẫn của người điều khiển giao thông, quy định về tốc độ, tín hiệu đèn, biển báo hiệu, vạch kẻ đường khi lái xe; nhường đường cho người đi bộ, người già, trẻ em, người khuyết tật."},"answer":"B"},
{"num":191,"id":191,"q":"Người lái xe mô tô có văn hóa giao thông khi tham gia giao thông phải tuân thủ những quy định nào dưới đây?","opts":{"A":" Điều khiển xe đi bên phải theo chiều đi của mình; đi đúng phần đường, làn đường quy định; đội mũ bảo hiểm đúng quy chuẩn kỹ thuật quốc gia, cài quai đúng quy cách.","B":"Điều khiển xe đi trên phần đường, làn đường có ít phương tiện tham gia giao thông.","C":"Điều khiển xe và đội mũ bảo hiểm ở nơi có biển báo bắt buộc đội mũ bảo hiểm."},"answer":"A"},
{"num":192,"id":192,"q":"Trong các hành vi dưới đây, người lái xe có văn hóa giao thông phải ứng xử như thế nào?","opts":{"A":" Điều khiển xe đi bên phải theo chiều đi của mình; đi đúng phần đường, làn đường quy định; dừng, đỗ xe đúng nơi quy định; đã uống rượu, bia thì không lái xe.","B":"Điều khiển xe đi trên phần đường, làn đường có ít phương tiện giao thông; dừng xe, đỗ xe ở nơi thuận tiện hoặc theo yêu cầu của hành khách, của người thân.","C":"Dừng và đỗ xe ở nơi thuận tiện cho việc chuyên chở hành khách và giao nhận hàng hóa; sử dụng ít rượu, bia thì có thể lái xe."},"answer":"A"},
{"num":193,"id":193,"q":"Khi tham gia giao thông việc sử dụng còi xe nên dùng như thế nào để thể hiện là người có văn hóa giao thông?","opts":{"A":" Chỉ bấm còi khi thật sự cần thiết, không bấm còi liên tục hoặc kéo dài, sử dụng còi với mức âm lượng theo quy định.","B":"Bấm còi liên tục để các xe khác nhường đường.","C":"Bấm còi to khi đi qua khu vực đông dân cư.","D":"Không cần dùng còi, tránh gây tiếng ồn là văn minh."},"answer":"A"},
{"num":194,"id":194,"q":"Người điều khiển phương tiện tham giao thông đường bộ gây ra tai nạn giao thông đường bộ, người liên quan đến vụ tai nạn giao thông đường bộ có trách nhiệm gì dưới đây?","opts":{"A":"Dừng ngay phương tiện, cảnh báo nguy hiểm, giữ nguyên hiện trường, trợ giúp người bị nạn và báo tin cho cơ quan Công an, cơ sở khám bệnh, chữa bệnh.","B":"Ở lại hiện trường vụ tai nạn giao thông đường bộ cho đến khi người của cơ quan Công an đến, trừ trường hợp phải đi cấp cứu, đưa người bị nạn đi cấp cứu hoặc xét thấy bị đe dọa đến tính mạng, sức khỏe nhưng phải đến trình báo ngay cơ quan Công an, Ủy ban nhân dân nơi gần nhất.","C":"Cung cấp thông tin xác định danh tính về bản thân, người liên quan đến vụ tai nạn giao thông đường bộ và thông tin liên quan của vụ tai nạn giao thông đường bộ cho cơ quan có thẩm quyền.","D":" Cả ba ý trên."},"answer":"D"},
{"num":195,"id":195,"q":"Người có mặt tại nơi xảy ra vụ tai giao thông đường bộ có trách nhiệm gì dưới đây?","opts":{"A":" Giúp đỡ, cứu chữa kịp thời người bị nạn; báo tin ngay cho cơ quan Công an, cơ sở khám bệnh, chữa bệnh hoặc Ủy ban nhân dân nơi gần nhất; tham gia bảo vệ hiện trường; tham gia bảo vệ tài sản của người bị nạn; cung cấp thông tin liên quan về vụ tai nạn theo yêu cầu của cơ quan có thẩm quyền.","B":"Chụp lại hình ảnh vụ tai nạn (nếu có thiết bị ghi hình) và nhanh chóng rời khỏi hiện trường vụ tai nạn."},"answer":"A"},
{"num":196,"id":196,"q":"Khi sơ cứu ban đầu cho người bị tai nạn giao thông đường bộ không còn hô hấp, người lái xe và người có mặt tại hiện trường vụ tai nạn phải thực hiện các công việc gì dưới đây?","opts":{"A":" Đặt nạn nhân nằm ngửa, khai thông đường thở của nạn nhân; thực hiện các biện pháp hô hấp nhân tạo.","B":"Thực hiện các biện pháp hô hấp nhân tạo."},"answer":"A"},
{"num":197,"id":197,"q":"Hành vi bỏ trốn sau khi gây tai nạn để trốn tránh trách nhiệm hoặc khi có điều kiện mà cố ý không cứu giúp người bị tai nạn giao thông có bị nghiêm cấm hay không?","opts":{"A":"Không bị nghiêm cấm.","B":"Nghiêm cấm tuỳ từng trường hợp cụ thể.","C":" Bị nghiêm cấm."},"answer":"C","danger":"true"},
{"num":198,"id":198,"q":"Khi đang lái xe, thấy một người đi bộ đang sang đường trên vạch kẻ đường dành cho người đi bộ, người lái xe nên làm gì?","opts":{"A":" Giảm tốc độ và nhường đường cho người đi bộ.","B":"Bấm còi để họ đi nhanh hơn.","C":"Tiếp tục đi nếu đang vội.","D":"Vượt qua nếu thấy khoảng trống đủ rộng."},"answer":"A","danger":"true"},
{"num":199,"id":199,"q":"Khi gặp vụ tai nạn giao thông, người lái xe nên hành động như thế nào?","opts":{"A":"Chạy đi để tránh rắc rối.","B":" Dừng xe, hỗ trợ nạn nhân và báo cho cơ quan chức năng.","C":"Chỉ quan sát rồi tiếp tục di chuyển.","D":"Chỉ giúp đỡ nếu có người thân trong vụ tai nạn."},"answer":"B"},
{"num":200,"id":200,"q":"Trong đoạn đường hai chiều tại khu đông dân cư đang ùn tắc, người điều khiển xe mô tô có văn hóa giao thông sẽ lựa chọn cách xử lý tình huống nào dưới đây?","opts":{"A":"Cho xe lấn sang làn ngược chiều để nhanh chóng thoát khỏi nơi ùn tắc.","B":"Điều khiển xe trên vỉa hè để nhanh chóng thoát khỏi nơi ùn tắc.","C":" Kiên nhẫn tuân thủ hướng dẫn của người điều khiển giao thông hoặc tín hiệu đèn giao thông, di chuyển trên đúng phần đường bên phải theo chiều đi, nhường đường cho các phương tiện đi ngược chiều."},"answer":"C"},
{"num":201,"id":201,"q":"Khi điều khiển phương tiện tham gia giao thông trên đoạn đường bộ đang xảy ra ùn tắc, những hành vi nào dưới đây là thiếu văn hóa?","opts":{"A":" Bấm còi liên tục thúc giục các phương tiện phía trước nhường đường; đi trên vỉa hè, tận dụng mọi khoảng trống để nhanh chóng thoát khỏi nơi ùn tắc; lấn sang trái đường cố gắng vượt lên xe khác.","B":"Tuân thủ hướng dẫn của người điều khiển giao thông hoặc tín hiệu giao thông, đi đúng phần đường, làn đường quy định."},"answer":"A"},
{"num":202,"id":202,"q":"Người lái xe, chủ phương tiện giao thông cơ giới đường bộ nên thực hiện các biện pháp phòng cháy, chữa cháy như thế nào dưới đây?","opts":{"A":"Không lắp đặt thêm thiết bị điện, phụ kiện không đúng theo thiết kế của nhà sản xuất; tuân thủ quy trình vận hành bảo trì bảo dưỡng định kỳ; thường xuyên kiểm tra phương tiện, khi phát hiện thấy dấu hiệu khác lạ (khó nổ, có hơi xăng, có tiếng kêu bất thường, nhiệt độ của máy cao, có mùi khét) cần khắc phục ngay.","B":"Khi để xe trong nhà, ở nơi trông giữ xe phải tắt khóa điện, để xa nguồn lửa, nguồn nhiệt; không mua xăng, dầu ở các điểm bán tự phát, không rõ nguồn gốc; không sử dụng các biện pháp “tiết kiệm xăng, dầu” khi chưa được kiểm chứng về mức độ an toàn có thể gây hỏng xe hoặc dẫn đến nguy cơ xảy ra cháy cao.","C":"Không để các chất dễ cháy, dễ bắt lửa trong xe, dưới yên xe, trong cốp xe, trong khoang động cơ. Đối với xe điện cần chọn địa điểm sạc an toàn, sử dụng các thiết bị sạc đúng cách và giám sát quá trình sạc.","D":" Cả ba ý trên."},"answer":"D"},
{"num":203,"id":203,"q":"Người điều khiển phương tiện cơ giới đường bộ phải thực hiện những biện pháp gì dưới đây để chữa cháy trong trường hợp phương tiện bị cháy, xét thấy có khả năng dập tắt đám cháy?","opts":{"A":"Tắt khoá điện, hô hoán để mọi người đến trợ giúp chữa cháy, gọi Cảnh sát phòng cháy chữa cháy và cứu nạn cứu hộ (điện thoại 114).","B":"Nếu nhiên liệu chưa trào ra ngoài (ngọn lửa chưa cháy dữ dội) thì có thể sử dụng nước, hoặc bất kỳ chất, phương tiện chữa cháy có được để dập lửa; nếu nhiên liệu đã trào ra ngoài (ngọn lửa cháy dữ dội) thì phải sử dụng các bình chữa cháy, cát, chăn chiên, bao tải, vải nhúng nước để dập lửa.","C":" Cả hai ý trên."},"answer":"C"},
{"num":204,"id":204,"q":"Khi phát hiện thấy có ngọn lửa, khói hoặc nhiệt độ cao bất thường từ phương tiện giao thông do mình điều khiển người lái xe phải làm gì trước tiên?","opts":{"A":" Bình tĩnh, đưa xe sát vào lề đường, tránh xa nơi có nhiều người, nhiều chất dễ cháy và tắt khóa điện, thực hiện các bước chữa cháy.","B":"Hô hoán để mọi người đến trợ giúp chữa cháy, gọi Cảnh sát giao thông, Cảnh sát phòng cháy, chữa cháy và cứu nạn, cứu hộ, lực lượng y tế để sẵn sàng hỗ trợ cứu người.","C":"Nếu nhiên liệu trào ra ngoài, ngọn lửa chưa cháy dữ dội thì tiếp tục sử dụng nước, hoặc bất kỳ chất, phương tiện chữa cháy có được để dập lửa.","D":"Cả ba ý trên."},"answer":"A"},
{"num":205,"id":205,"q":"Khi gặp nạn nhân bị bỏng trong vụ tai nạn giao thông, người lái xe cần làm gì?","opts":{"A":"Gọi số 115 để thông báo về tình trạng tai nạn và yêu cầu hỗ trợ y tế ngay lập tức. Quan sát hiện trường để giúp nạn nhân, đồng thời tránh gây tổn thương cho mình.","B":"Nhanh chóng loại bỏ nguyên nhân gây bỏng bằng cách tách nạn nhân khỏi vật gây cháy, cởi bỏ quần áo nếu bén lửa, ngâm vùng da bị bỏng vào nước sạch hoặc đắp khăn mát, lưu ý không dùng khăn hoặc nước quá lạnh.","C":"Nếu nạn nhân còn tỉnh, cần cho uống bù nước. Trong thời tiết lạnh, cần giữ ấm cho cơ thể nạn nhân, sau đó nhanh chóng đưa đến cơ sở y tế gần nhất.","D":" Cả ba ý trên."},"answer":"D"}
]},


{"id": "phan-3", "title": "Kỹ thuật", "count": 58, "questions": [
{"num":206,"id":206,"q":"Khi điều khiển xe mô tô tay ga xuống đường dốc dài, độ dốc cao, người lái xe cần thực hiện các thao tác nào dưới đây để bảo đảm an toàn?","opts":{"A":" Giữ tay ga ở mức độ phù hợp, sử dụng phanh trước và phanh sau để giảm tốc độ.","B":"Nhả hết tay ga, tắt động cơ, sử dụng phanh trước và phanh sau để giảm tốc độ.","C":"Sử dụng phanh trước để giảm tốc độ kết hợp với tắt chìa khóa điện của xe."},"answer":"A","danger":"true"},
{"num":207,"id":207,"q":"Khi vào số để khởi hành xe ô tô có số tự động, người lái xe phải thực hiện các thao tác nào để bảo đảm an toàn?","opts":{"A":" Đạp bàn đạp phanh chân hết hành trình, vào số và nhả phanh đỗ, kiểm tra lại xem có bị nhầm số không rồi mới cho xe lăn bánh.","B":"Đạp bàn đạp để tăng ga với mức độ phù hợp, vào số và kiểm tra lại xem có bị nhầm số không rồi mới cho xe lăn bánh."},"answer":"A"},
{"num":208,"id":208,"q":"Khi nhả phanh đỗ cơ khí điều khiển bằng tay (phanh tay), người lái xe cần phải thực hiện các thao tác nào?","opts":{"A":"Dùng lực tay phải kéo cần phanh tay về phía sau hết hành trình; nếu khóa hãm bị kẹt cứng phải đẩy mạnh phanh tay về phía trước, sau đó bóp khóa hãm.","B":" Dùng lực tay phải bóp khóa hãm đẩy cần phanh tay về phía trước hết hành trình; nếu khóa hãm bị kẹt cứng phải kéo cần phanh tay về phía sau đồng thời bóp khóa hãm.","C":"Dùng lực tay phải đẩy cần phanh tay về phía trước hết hành trình; nếu khóa hãm bị kẹt cứng phải đẩy mạnh phanh tay về phía trước, sau đó bóp khóa hãm."},"answer":"B"},
{"num":209,"id":209,"q":"Khi khởi hành ô tô sử dụng hộp số cơ khí trên đường bằng, người lái xe cần thực hiện các thao tác nào theo trình tự dưới đây?","opts":{"A":"Kiểm tra an toàn xung quanh xe ô tô; nhả từ từ đến 1/2 hành trình bàn đạp ly hợp (côn) và giữ trong khoảng 3 giây; vào số 1; nhả hết phanh tay, báo hiệu bằng còi, đèn trước khi xuất phát; tăng ga đủ để xuất phát, sau đó vừa tăng ga vừa nhả hết côn để cho xe ô tô chuyển động.","B":" Kiểm tra an toàn xung quanh xe ô tô; đạp ly hợp (côn) hết hành trình; vào số 1; nhả hết phanh tay, báo hiệu bằng còi, đèn trước khi xuất phát; tăng ga đủ để xuất phát; nhả từ từ đến 1/2 hành trình bàn đạp côn và giữ trong khoảng 3 giây, sau đó vừa tăng ga vừa nhả hết côn để cho xe ô tô chuyển động."},"answer":"B"},
{"num":210,"id":210,"q":"Khi quay đầu xe, người lái xe cần phải quan sát và thực hiện các thao tác nào để bảo đảm an toàn giao thông?","opts":{"A":" Quan sát biển báo hiệu để biết nơi được phép quay đầu; quan sát kỹ địa hình nơi chọn để quay đầu; lựa chọn quỹ đạo quay đầu xe cho thích hợp; quay đầu xe với tốc độ thấp; thường xuyên báo tín hiệu để người, các phương tiện xung quanh được biết; nếu quay đầu xe ở nơi nguy hiểm thì đưa đầu xe về phía nguy hiểm, đưa đuôi xe về phía an toàn.","B":"Quan sát biển báo hiệu để biết nơi được phép quay đầu; quan sát kỹ địa hình nơi chọn để quay đầu; lựa chọn quỹ đạo quay đầu xe; quay đầu xe với tốc độ tối đa; thường xuyên báo tín hiệu để người, các phương tiện xung quanh được biết; nếu quay đầu xe ở nơi nguy hiểm thì đưa đuôi xe về phía nguy hiểm và đầu xe về phía an toàn."},"answer":"A"},
{"num":211,"id":211,"q":"Khi ngồi lái ô tô tư thế chân, lưng, tay của người lái xe như thế nào là đúng để bảo đảm an toàn và thoải mái?","opts":{"A":" Điều chỉnh ghế sao cho chân có thể đạp phanh và ga dễ dàng, ngồi thẳng lưng, hai tay nắm vô lăng, tay trái nắm ở vị trí 9 đến 10 giờ và tay phải nắm ở vị trí từ 2 đến 4 giờ.","B":"Ngồi sát vô lăng để dễ quan sát hoặc ngồi tự do, không cần điều chỉnh ghế.","C":"Ngồi ngả người về phía sau nhiều để thư giãn, chân trái để ở vị trí chân ga, hai tay nắm vô lăng ở vị trí bất kỳ."},"answer":"A"},
{"num":212,"id":212,"q":"Khi điều khiển ô tô lên dốc cao, người lái xe cần thực hiện các thao tác nào dưới đây để bảo đảm an toàn?","opts":{"A":"Tăng lên số cao từ chân dốc, điều chỉnh ga cho xe nhanh lên dốc; đến gần đỉnh dốc phải tăng ga để xe nhanh chóng qua dốc; về số thấp, đi sát về phía bên phải đường, có tín hiệu (còi, đèn) để báo cho người lái xe đi ngược chiều biết.","B":" Về số thấp từ chân dốc, điều chỉnh ga cho xe từ từ lên dốc; đến gần đỉnh dốc phải đi chậm, đi sát về phía bên phải đường, có tín hiệu (còi, đèn) để báo cho người lái xe đi ngược chiều biết."},"answer":"B"},
{"num":213,"id":213,"q":"Khi điều khiển ô tô xuống dốc dài, người lái xe cần thực hiện các thao tác nào dưới đây để bảo đảm an toàn?","opts":{"A":"Tăng lên số cao, nhả bàn đạp ga ở mức độ phù hợp, kết hợp với phanh chân để khống chế tốc độ.","B":" Về số thấp, nhả bàn đạp ga ở mức độ phù hợp, kết hợp với phanh chân để khống chế tốc độ.","C":"Về số không (0), nhả bàn đạp ga ở mức độ phù hợp, kết hợp với phanh chân để khống chế tốc độ."},"answer":"B"},
{"num":214,"id":214,"q":"Khi xuống dốc, muốn dừng xe, người lái xe cần thực hiện các thao tác nào để bảo đảm an toàn?","opts":{"A":" Có tín hiệu rẽ phải, điều khiển xe sát vào lề đường bên phải; đạp phanh sớm và mạnh hơn lúc dừng xe trên đường bằng để xe đi với tốc độ chậm đến mức dễ dàng dừng lại được; về số 1, đạp 1/2 ly hợp (côn) cho xe đến chỗ dừng; khi xe đã dừng, về số không (N), đạp phanh chân, sử dụng phanh đỗ.","B":"Có tín hiệu rẽ phải, điều khiển xe sát vào lề đường bên trái; đạp hết hành trình ly hợp (côn) và nhả bàn đạp ga để xe đi với tốc độ chậm đến mức dễ dàng dừng lại được tại chỗ dừng; khi xe đã dừng, đạp và giữ phanh chân.","C":"Có tín hiệu rẽ trái, điều khiển xe sát vào lề đường bên phải; đạp phanh sớm và mạnh hơn lúc dừng xe trên đường bằng để xe đi với tốc độ chậm đến mức dễ dàng dừng lại được; về số không (N) để xe đi đến chỗ dừng, khi xe đã dừng, sử dụng phanh đỗ."},"answer":"A"},
{"num":215,"id":215,"q":"Khi điều khiển xe trên đường vòng người lái xe cần phải làm gì để bảo đảm an toàn?","opts":{"A":" Quan sát cẩn thận các chướng ngại vật và báo hiệu bằng coi, đèn; giảm tốc độ tới mức cần thiết, về số thấp và thực hiện quay vòng với tốc độ phù hợp với bán kính cong của đường vòng.","B":"Quan sát cẩn thận các chướng ngại vật và báo hiệu bằng còi, đèn; tăng tốc để nhanh chóng qua đường vòng và giảm tốc độ sau khi qua đường vòng."},"answer":"A","danger":"true"},
{"num":216,"id":216,"q":"Khi điều khiển xe ô tô rẽ phải, người lái xe cần thực hiện các thao tác nào để bảo đảm an toàn?","opts":{"A":"Có tín hiệu rẽ phải; quan sát an toàn phía sau; điều khiển xe sang làn đường bên trái; giảm tốc độ và quan sát an toàn phía bên phải để điều khiển xe qua chỗ đường giao nhau.","B":" Cách chỗ rẽ một khoảng cách an toàn có tín hiệu rẽ phải; giảm tốc độ, quan sát an toàn phía trước, sau, bên phải và điều khiển xe từ từ rẽ phải.","C":"Cách chỗ rẽ một khoảng cách an toàn có tín hiệu rẽ phải; quan sát an toàn phía sau; điều khiển xe bám sát vào phía phải đường; tăng tốc độ và quan sát an toàn phía bên trái để điều khiển xe qua chỗ đường giao nhau."},"answer":"B"},
{"num":217,"id":217,"q":"Khi điều khiển xe ô tô rẽ trái, người lái xe cần thực hiện các thao tác nào để bảo đảm an toàn?","opts":{"A":" Cách chỗ rẽ một khoảng cách an toàn có tín hiệu rẽ trái; giảm tốc độ, quan sát an toàn xung quanh đặc biệt là bên trái; đổi sang làn đường bên trái và điều khiển xe từ từ rẽ trái.","B":"Cách chỗ rẽ một khoảng cách an toàn có tín hiệu rẽ trái, tăng tốc độ để xe nhanh chóng qua chỗ đường giao nhau; có tín hiệu xin đổi làn đường; quan sát an toàn xung quanh đặc biệt là bên trái; đổi làn đường sang phải để mở rộng vòng cua."},"answer":"A"},
{"num":218,"id":218,"q":"Khi điều khiển xe sử dụng hộp số cơ khí vượt qua rãnh lớn cắt ngang mặt đường, người lái xe cần thực hiện các thao tác nào để đảm bảo an toàn?","opts":{"A":"Vào số một (1) và từ từ cho hai bánh xe trước xuống rãnh, tăng ga cho hai bánh xe trước vượt lên khỏi rãnh, tăng số, tăng tốc độ để bánh xe sau vượt qua rãnh.","B":"Tăng ga, tăng số để hai bánh xe trước và bánh xe sau vượt qua khỏi rãnh và chạy bình thường.","C":" Vào số một (1) và từ từ cho hai bánh xe trước xuống rãnh, tăng ga cho hai bánh xe trước vượt lên khỏi rãnh, tiếp tục để bánh xe sau từ từ xuống rãnh rồi tăng dần ga cho xe ô tô lên khỏi rãnh."},"answer":"C"},
{"num":219,"id":219,"q":"Khi điều khiển xe qua đường sắt, người lái xe cần phải thực hiện các thao tác nào dưới đây để bảo đảm an toàn?","opts":{"A":"Khi có chuông báo hoặc thanh chắn đã hạ xuống, người lái xe phải dừng xe tạm thời đúng khoảng cách an toàn, kéo phanh tay nếu đường dốc hoặc phải chờ lâu.","B":"Khi không có chuông báo hoặc thanh chắn không hạ xuống, người lái xe cần phải quan sát nếu thấy đủ điều kiện an toàn thì về số thấp, tăng ga nhẹ và không thay đổi số trong quá trình vượt qua đường sắt để tránh động cơ chết máy cho xe cho vượt qua.","C":" Cả hai ý trên."},"answer":"C"},
{"num":220,"id":220,"q":"Khi điều khiển xe ô tô tự đổ, người lái xe cần chú ý những điểm gì để bảo đảm an toàn?","opts":{"A":"Khi chạy trên đường xấu, nhiều ổ gà nên chạy chậm để thùng xe không bị lắc mạnh, không gây hiện tượng lệch \"ben\"; khi chạy vào đường vòng, cần giảm tốc độ, không lấy lái gấp và không phanh gấp.","B":"Khi chạy trên đường quốc lộ, đường bằng phẳng không cần hạ hết thùng xe xuống.","C":"Khi đổ hàng phải chọn vị trí có nền đường cứng và phẳng, dừng hẳn xe, kéo hết phanh đỗ; sau đó mới điều khiển cơ cấu nâng \"ben\" để đổ hàng, đổ xong hàng mới hạ thùng xuống.","D":" Ý 1 và ý 3."},"answer":"D"},
{"num":221,"id":221,"q":"Khi điều khiển xe tăng số, người lái xe cần chú ý những điểm gì để bảo đảm an toàn?","opts":{"A":" Không được nhìn xuống buồng lái, cần phải tăng thứ tự từ thấp đến cao, phối hợp các động tác phải nhịp nhàng, chính xác.","B":"Nhìn xuống buồng lái để biết chính xác vị trí các tay số, cần phải tăng thứ tự từ thấp đến cao, phối hợp các động tác phải nhịp nhàng, vù ga phải phù hợp với tốc độ."},"answer":"A"},
{"num":222,"id":222,"q":"Khi điều khiển xe giảm số, người lái xe cần phải chú ý những điểm gì để bảo đảm an toàn?","opts":{"A":"Nhìn xuống buồng lái để biết chính xác vị trí các tay số, cần phải giảm thứ tự từ cao xuống thấp, phối hợp các động tác phải nhịp nhàng, chính xác.","B":" Không được nhìn xuống buồng lái, cần phải giảm thứ tự từ cao xuống thấp, phối hợp các động tác phải nhịp nhàng, chính xác, vù ga phải phù hợp với tốc độ."},"answer":"B"},
{"num":223,"id":223,"q":"Để giảm tốc độ khi ô tô đi xuống đường dốc dài, người lái xe phải thực hiện các thao tác nào để bảo đảm an toàn?","opts":{"A":"Nhả bàn đạp ga, đạp ly hợp (côn) hết hành trình, đạp mạnh phanh chân để giảm tốc độ.","B":" Về số thấp phù hợp, nhả bàn đạp ga, kết hợp đạp phanh chân với mức độ phù hợp để giảm tốc độ.","C":"Nhả bàn đạp ga, tăng lên số cao, đạp phanh chân với mức độ phù hợp để giảm tốc độ."},"answer":"B"},
{"num":224,"id":224,"q":"Khi điều khiển ô tô qua đường ngập nước, người lái xe cần thực hiện các thao tác nào để đảm bảo an toàn?","opts":{"A":"Tăng lên số cao, tăng ga và giảm ga liên tục để thay đổi tốc độ, giữ vững tay lái để ô tô vượt qua đoạn đường ngập nước.","B":"Đạp ly hợp (côn) hết hành trình, tăng ga và giảm ga liên tục để thay đổi tốc độ, giữ vững tay lái để ô tô vượt qua đoạn đường ngập nước.","C":" Quan sát, ước lượng độ ngập nước mà xe ô tô có thể vượt qua an toàn, về số thấp, giữ đều ga và giữ vững tay lái để ô tô vượt qua đoạn đường ngập nước."},"answer":"C"},
{"num":225,"id":225,"q":"Khi điều khiển xe ô tô tới gần xe chạy ngược chiều vào ban đêm, người lái xe cần thực hiện các thao tác nào để bảo đảm an toàn?","opts":{"A":" Chuyển từ đèn chiếu xa sang đèn chiếu gần; không nhìn thẳng vào đèn của xe chạy ngược chiều mà nhìn chếch sang phía phải theo chiều chuyển động của xe mình.","B":"Chuyển từ đèn chiếu gần sang đèn chiếu xa; không nhìn thẳng vào đèn của xe chạy ngược chiều mà nhìn chếch sang phía phải theo chiều chuyển động của xe mình.","C":"Chuyển từ đèn chiếu xa sang đèn chiếu gần; nhìn thẳng vào đèn của xe chạy ngược chiều để tránh xe bảo đảm an toàn."},"answer":"A"},
{"num":226,"id":226,"q":"Khi điều khiển xe ô tô trên đường trơn cần chú ý những điểm gì để bảo đảm an toàn?","opts":{"A":"Giữ vững tay lái cho xe đi đúng vệt bánh xe đi trước, sử dụng số thấp đi chậm, giữ đều ga, đánh lái ngoặt và phanh gấp khi cần thiết.","B":" Giữ vững tay lái cho xe đi đúng vệt bánh xe đi trước, sử dụng số thấp đi chậm, gài cầu (nếu có), giữ đều ga, không lấy nhiều lái, không đánh lái ngoặt và phanh gấp."},"answer":"B","danger":"true"},
{"num":227,"id":227,"q":"Khi động cơ xe ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây là báo hiệu tình trạng gì của xe ô tô?","img":"q227.jpg","opts":{"A":" Đang sử dụng phanh đỗ.","B":"Nhiệt độ nước làm mát quá mức cho phép.","C":"Cửa xe đang mở."},"answer":"A"},
{"num":228,"id":228,"q":"Khi động cơ xe ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây là báo hiệu tình trạng gì của xe ô tô?","img":"q228.jpg","opts":{"A":"Đang sử dụng phanh đỗ.","B":"Thiếu dầu phanh.","C":"Nhiệt độ nước làm mát tăng quá mức cho phép.","D":" Áp suất dầu ở mức thấp."},"answer":"D"},
{"num":229,"id":229,"q":"Khi động cơ xe ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây là báo hiệu tình trạng gì của xe ô tô?","img":"q229.jpg","opts":{"A":" Cửa xe đóng chưa chặt hoặc có cửa xe chưa đóng.","B":"Bộ nạp ắc quy gặp sự cố kỹ thuật.","C":"Dầu bôi trơn bị thiếu.","D":"Ý 2 và ý 3."},"answer":"A"},
{"num":230,"id":230,"q":"Khi động cơ xe ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây là báo hiệu tình trạng gì của xe ô tô?","img":"q230.jpg","opts":{"A":"Thiếu dầu phanh, phanh tay đang hãm.","B":"Hệ thống túi khí an toàn gặp sự cố.","C":" Lái xe và người ngồi ghế trước chưa cài dây đai an toàn.","D":"Cửa đóng chưa chặt, có cửa chưa đóng."},"answer":"C"},
{"num":231,"id":231,"q":"Khi động cơ xe ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây là báo hiệu tình trạng gì của xe ô tô?","img":"q231.jpg","opts":{"A":"Báo hiệu thiếu dầu phanh.","B":"Áp suất lốp không đủ.","C":"Đang sử dụng phanh đỗ.","D":" Sắp hết nhiên liệu."},"answer":"D"},
{"num":232,"id":232,"q":"Trong các loại nhiên liệu dưới đây, loại nhiên liệu nào giảm thiểu ô nhiễm môi trường?","opts":{"A":"Xăng và dầu diesel.","B":" Xăng sinh học và khí sinh học.","C":"Ý 1 và ý 2."},"answer":"B"},
{"num":233,"id":233,"q":"Các biện pháp tiết kiệm nhiên liệu khi chạy xe?","opts":{"A":"Bảo dưỡng xe theo định kỳ và có kế hoạch lộ trình trước khi xe chạy.","B":"Kiểm tra áp suất lốp theo quy định và chạy xe với tốc độ phù hợp với tình trạng mặt đường và mật độ giao thông trên đường.","C":" Cả hai ý trên."},"answer":"C"},
{"num":234,"id":234,"q":"Khi đã đỗ xe ô tô sát lề đường bên phải, người lái xe phải thực hiện các thao tác nào dưới đây khi mở cửa xuống xe để đảm bảo an toàn?","opts":{"A":" Quan sát tình hình giao thông phía trước, phía sau và phía bên mở cửa xe, mở hé cánh cửa, nếu đảm bảo an toàn thì mở cửa ở mức cần thiết để xuống xe ô tô.","B":"Mở cánh cửa và quan sát tình hình giao thông phía trước, nếu đảm bảo an toàn thì mở cửa ở mức cần thiết để xuống xe ô tô.","C":"Mở cánh cửa hết hành trình và nhanh chóng ra khỏi xe ô tô."},"answer":"A","danger":"true"},
{"num":235,"id":235,"q":"Khi điều khiển xe ô tô qua đường sắt không có rào chắn, không có người điều khiển giao thông, người lái xe phải xử lý như thế nào?","opts":{"A":"Giảm tốc độ, dừng lại trước vạch dừng, quan sát cả hai phía, nếu không có tàu đi tới, tăng ga nhẹ vượt qua đường sắt.","B":"Nếu thấy có tàu đi tới thì dừng lại trước vạch dừng, chỉ khi tàu đi qua mới được đi.","C":" Cả hai ý trên."},"answer":"C"},
{"num":236,"id":236,"q":"Khi lái xe ô tô qua đường sắt không có rào chắn, không có người điều khiển giao thông, người lái xe thực hiện thao tác: “giảm tốc độ, dừng lại trước vạch dừng, quan sát cả hai phía, nếu không có tàu đi tới, tăng ga nhẹ vượt qua đường sắt. Nếu thấy có tàu đi tới thì dừng lại trước vạch dừng, chỉ khi tàu đi qua mới được đi” để đảm bảo an toàn là đúng hay không?","opts":{"A":"Không đúng.","B":" Đúng.","C":"Không cần thiết, vì nếu nhìn thấy tàu còn cách xa, người lái xe có thể tăng số cao, tăng ga để cho xe nhanh chóng vượt qua đường sắt."},"answer":"B"},
{"num":237,"id":237,"q":"Khi điều khiển xe ô tô có hộp số tự động đi vào đường trơn trượt, lầy lội, người lái xe phải xử lý như thế nào để đảm bảo an toàn?","opts":{"A":" Về số thấp, kết hợp phanh chân để giảm tốc độ.","B":"Giữ nguyên tay số D, kết hợp phanh đỗ để giảm tốc độ.","C":"Về số N (số 0), kết hợp phanh chân để giảm tốc độ."},"answer":"A"},
{"num":238,"id":238,"q":"Khi động cơ ô tô đã khởi động, muốn điều chỉnh ghế của người lái, người lái xe phải để cần số ở vị trí nào?","opts":{"A":" Vị trí N hoặc vị trí P hoặc số 0.","B":"Vị trí D hoặc số 1.","C":"Vị trí R."},"answer":"A"},
{"num":239,"id":239,"q":"Khi điều khiển xe ô tô có hộp số tự động, người lái xe sử dụng chân như thế nào là đúng để bảo đảm an toàn?","opts":{"A":" Không sử dụng chân trái; chân phải điều khiển bàn đạp phanh và bàn đạp ga.","B":"Chân trái điều khiển bàn đạp phanh, chân phải điều khiển bàn đạp ga.","C":"Không sử dụng chân phải; chân trái điều khiển bàn đạp phanh và bàn đạp ga."},"answer":"A"},
{"num":240,"id":240,"q":"Khi tầm nhìn bị hạn chế bởi sương mù hoặc mưa to, người lái xe phải thực hiện các thao tác nào để bảo đảm an toàn?","opts":{"A":"Tăng tốc độ, chạy gần xe trước, nhìn đèn hậu để định hướng.","B":" Giảm tốc độ, chạy cách xa xe trước với khoảng cách an toàn, bật đèn sương mù và đèn chiếu gần.","C":"Tăng tốc độ, bật đèn pha vượt qua xe chạy trước."},"answer":"B"},
{"num":241,"id":241,"q":"Khi đèn pha của xe đi ngược chiều gây chói mắt, làm giảm khả năng quan sát trên đường, người lái xe xử lý như thế nào dưới đây để bảo đảm an toàn?","opts":{"A":" Giảm tốc độ, giữ vững tay lái, nhìn chếch sang lề đường bên phải.","B":"Bật đèn pha chiếu xa và giữ nguyên tốc độ.","C":"Tăng tốc độ, bật đèn pha đối diện xe phía trước."},"answer":"A"},
{"num":242,"id":242,"q":"Để đạt được hiệu quả phanh cao nhất, người lái xe mô tô phải sử dụng các kỹ năng như thế nào dưới đây?","opts":{"A":"Sử dụng phanh trước.","B":"Sử dụng phanh sau.","C":" Giảm hết ga, sử dụng đồng thời cả phanh sau và phanh trước."},"answer":"C"},
{"num":243,"id":243,"q":"Khi lái xe ô tô trên mặt đường có nhiều \"ổ gà\", người lái xe phải thực hiện thao tác như thế nào để bảo đảm an toàn?","opts":{"A":" Giảm tốc độ, về số thấp và giữ đều ga.","B":"Tăng tốc độ cho xe lướt qua nhanh.","C":"Tăng tốc độ, đánh lái liên tục để tránh \"ổ gà\"."},"answer":"A"},
{"num":244,"id":244,"q":"Khi điều khiển xe ô tô gặp mưa to hoặc sương mù, người lái xe phải làm gì để bảo đảm an toàn?","opts":{"A":" Bật đèn chiếu gần và đèn vàng (nếu có), điều khiển gạt nước, điều khiển ô tô đi với tốc độ chậm để có thể quan sát được; tìm chỗ an toàn dừng xe, bật đèn dừng khẩn cấp báo hiệu cho các xe khác biết.","B":"Bật đèn chiếu xa và đèn vàng, điều khiển gạt nước, tăng tốc độ điều khiển ô tô qua khỏi khu vực mưa hoặc sương mù.","C":"Tăng tốc độ, bật đèn pha vượt qua xe chạy phía trước."},"answer":"A"},
{"num":245,"id":245,"q":"Điều khiển xe ô tô trong trời mưa, người lái xe phải xử lý như thế nào để bảo đảm an toàn?","opts":{"A":" Giảm tốc độ, tăng cường quan sát, không nên phanh gấp, không nên tăng ga hay đánh vô lăng đột ngột, bật đèn chiếu gần, mở chế độ gạt nước ở chế độ phù hợp để đảm bảo quan sát.","B":"Phanh gấp khi xe đi vào vũng nước và tăng ga ngay sau khi ra khỏi vũng nước.","C":"Bật đèn chiếu xa, tăng tốc độ điều khiển ô tô qua khỏi khu vực mưa."},"answer":"A","danger":"true"},
{"num":246,"id":246,"q":"Khi lùi xe, người lái xe phải xử lý như thế nào để bảo đảm an toàn giao thông?","opts":{"A":" Quan sát bên trái, bên phải, phía sau xe, có tín hiệu cần thiết và lùi xe với tốc độ phù hợp.","B":"Quan sát phía trước xe và lùi xe với tốc độ nhanh.","C":"Quan sát bên trái và phía trước của xe và lùi xe với tốc độ nhanh."},"answer":"A","danger":"true"},
{"num":247,"id":247,"q":"Điều khiển xe ô tô trong khu vực đông dân cư cần lưu ý điều gì dưới đây?","opts":{"A":"Giảm tốc độ đến mức an toàn, quan sát, nhường đường cho người đi bộ, giữ khoảng cách an toàn với các xe phía trước.","B":"Đi đúng làn đường quy định, chỉ được chuyển làn đường ở nơi cho phép, nhưng phải quan sát.","C":" Cả hai ý trên."},"answer":"C"},
{"num":248,"id":248,"q":"Khi điều khiển xe ô tô nhập vào đường cao tốc người lái xe cần thực hiện như thế nào dưới đây để bảo đảm an toàn giao thông?","opts":{"A":" Quan sát, phát tín hiệu, nhường đường cho các xe đang chạy trên đường cao tốc, khi đủ điều kiện an toàn thì tăng tốc độ cho xe nhập vào làn đường cao tốc, nếu có làn đường tăng tốc thì phải cho xe chạy trên làn đường đó trước khi cho xe nhập vào làn của đường cao tốc.","B":"Phát tín hiệu, quan sát các xe đang chạy phía trước, nếu bảo đảm các điều kiện an toàn thì tăng tốc độ cho xe nhập ngay vào làn đường cao tốc.","C":"Phát tín hiệu và lái xe nhập vào làn đường tăng tốc, quan sát các xe phía sau đang chạy trên đường cao tốc, khi đủ điều kiện an toàn thì giảm tốc độ, từ từ cho xe nhập vào làn đường cao tốc."},"answer":"A"},
{"num":249,"id":249,"q":"Khi điều khiển xe ô tô ra khỏi đường cao tốc người lái xe cần thực hiện như thế nào dưới đây để bảo đảm an toàn giao thông?","opts":{"A":" Quan sát phía trước để tìm biển báo chỉ dẫn \"lối ra đường cao tốc\", kiểm tra tình trạng giao thông phía sau và bên phải, nếu bảo đảm điều kiện an toàn thì phát tín hiệu và điều khiển xe chuyển dần sang làn bên phải, nếu có làn đường giảm tốc thì phải cho xe di chuyển trên làn đường đó trước khi ra khỏi đường cao tốc.","B":"Quan sát phía trước để tìm biển báo chỉ dẫn \"lối ra đường cao tốc\", trường hợp vượt qua \"lối ra đường cao tốc\" thì phát tín hiệu, di chuyển sang làn đường giảm tốc và lùi xe quay trở lại."},"answer":"A"},
{"num":250,"id":250,"q":"Người lái xe được dừng xe, đỗ xe trên làn dừng khẩn cấp của đường cao tốc trong trường hợp nào dưới đây?","opts":{"A":" Xe gặp sự cố, tai nạn hoặc trường hợp khẩn cấp không thể di chuyển bình thường.","B":"Để nghỉ ngơi, đi vệ sinh, chụp ảnh, làm việc riêng...","C":"Cả hai ý trên."},"answer":"A"},
{"num":251,"id":251,"q":"Trên đường đôi muốn vượt xe kéo rơ moóc phía trước, người lái xe phải xử lý như thế nào?","opts":{"A":"Giữ khoảng cách an toàn, tránh đi vào vị trí điểm mù của xe kéo rơ moóc, bật xi nhan trái đồng thời kết hợp đèn, còi xin vượt.","B":"Khi xe kéo rơ moóc đã có tín hiệu cho vượt (không có chướng ngại vật phía trước và xe đi ngược chiều), thấy đủ điều kiện an toàn thì vượt dứt khoát, không di chuyển song song bên cạnh xe kéo rơ moóc.","C":"Khi vượt qua, phải quan sát gương chiếu hậu bên phải nếu có khoảng trống an toàn mới được cho xe chạy vào làn của mình, tắt xi nhan và tiếp tục hành trình.","D":" Cả ba ý trên."},"answer":"D"},
{"num":252,"id":252,"q":"Khi điều khiển xe ô tô xuống đường dốc dài, độ dốc cao, người lái xe số tự động cần thực hiện các thao tác nào dưới đây để bảo đảm an toàn?","opts":{"A":" Nhả bàn đạp ga, về số thấp, đạp phanh chân với mức độ phù hợp để giảm tốc độ.","B":"Nhả bàn đạp ga, về số N đạp phanh chân và kéo phanh tay để giảm tốc độ."},"answer":"A","danger":"true"},
{"num":253,"id":253,"q":"Khi đi từ đường nhánh ra đường chính, người lái xe phải xử lý như thế nào là đúng?","opts":{"A":" Quan sát, giảm tốc độ, phát tín hiệu, nhường đường cho xe trên đường chính từ bất kỳ hướng nào tới.","B":"Nháy đèn, bấm còi để xe đi trên đường chính biết và tăng tốc độ cho xe đi ra đường chính.","C":"Quan sát xe đang đi trên đường chính, nếu là xe có kích thước lớn hơn thì nhường đường, xe có kích thước nhỏ hơn thì tăng tốc độ cho xe đi ra đường chính."},"answer":"A","danger":"true"},
{"num":254,"id":254,"q":"Khi đang lái xe mô tô hoặc ô tô, nếu có nhu cầu sử dụng điện thoại để nhắn tin hoặc gọi điện, người lái xe phải thực hiện như thế nào trong các tình huống nêu dưới đây?","opts":{"A":"Giảm tốc độ để bảo đảm an toàn với xe phía trước và sử dụng điện thoại để liên lạc.","B":" Giảm tốc độ để dừng xe ở nơi cho phép sau đó sử dụng điện thoại để liên lạc.","C":"Tăng tốc độ để cách xa xe phía sau và sử dụng điện thoại để liên lạc."},"answer":"B","danger":"true"},
{"num":255,"id":255,"q":"Những thói quen nào dưới đây khi điều khiển xe mô tô tay ga tham gia giao thông dễ gây tai nạn nguy hiểm?","opts":{"A":"Sử dụng còi.","B":"Phanh đồng thời cả phanh trước và phanh sau.","C":" Chỉ sử dụng phanh trước."},"answer":"C","danger":"true"},
{"num":256,"id":256,"q":"Người ngồi trên xe ô tô cần thực hiện những thao tác mở cửa như thế nào dưới đây để xuống xe để bảo đảm an toàn?","opts":{"A":" Quan sát phía trước, phía sau và bên phía mở cửa để phát hiện các phương tiện đang di chuyển tới gần, khi đủ điều kiện an toàn, mở hé cửa, sau đó mở ở mức cần thiết để xuống xe.","B":"Quan sát tình hình giao thông phía trước, không cần quan sát phía sau và bên mở cửa; mở cánh cửa hết hành trình và nhanh chóng ra khỏi xe ô tô."},"answer":"A"},
{"num":257,"id":257,"q":"Khi điều khiển xe mô tô quay đầu, người lái xe cần thực hiện như thế nào để bảo đảm an toàn?","opts":{"A":"Bật tín hiệu báo rẽ trước khi quay đầu, từ từ giảm tốc độ đến mức có thể dừng lại.","B":"Chỉ quay đầu xe tại những nơi được phép quay đầu.","C":"Quan sát an toàn các phương tiện tới từ phía trước, phía sau, hai bên đồng thời nhường đường cho xe từ bên phải và phía trước đi tới.","D":" Cả ba ý trên."},"answer":"D"},
{"num":258,"id":258,"q":"Tay ga trên xe mô tô hai bánh có tác dụng gì dưới đây?","opts":{"A":"Để điều khiển xe chạy về phía trước.","B":"Để điều tiết công suất động cơ qua đó điều khiển tốc độ của xe.","C":"Để điều khiển xe chạy lùi.","D":" Ý 1 và ý 2."},"answer":"D"},
{"num":259,"id":259,"q":"Gương chiếu hậu của xe mô tô hai bánh có tác dụng gì dưới đây?","opts":{"A":"Để quan sát an toàn phía bên trái khi chuẩn bị rẽ trái.","B":"Để quan sát an toàn phía bên phải khi chuẩn bị rẽ phải.","C":" Để quan sát an toàn phía sau của bên trái và bên phải trước khi chuyển hướng.","D":"Để quan sát an toàn phía trước cả bên trái và bên phải trước khi chuyển hướng."},"answer":"C"},
{"num":260,"id":260,"q":"Để bảo đảm an toàn khi tham gia giao thông, người lái xe mô tô hai bánh cần điều khiển tay ga như thế nào?","opts":{"A":"Tăng ga thật mạnh, giảm ga từ từ.","B":"Tăng ga thật mạnh, giảm ga thật nhanh.","C":" Tăng ga từ từ, giảm ga thật nhanh.","D":"Tăng ga từ từ, giảm ga từ từ."},"answer":"C","danger":"true"},
{"num":261,"id":261,"q":"Để tránh đổ, ngã khi điều khiển xe mô tô hai bánh ở nơi đường xấu, nhỏ và hẹp, người lái xe cần xử lý như thế nào?","opts":{"A":"Đi ở tốc độ thấp, quan sát liên tục khoảng cách từ 05 m đến 10 m phía trước để điều chỉnh sớm hướng di chuyển.","B":"Trong quá trình di chuyển không nên dùng phanh trước tránh làm khóa bánh dẫn hướng.","C":"Không được lắc người sang trái hoặc phải nhiều, trọng tâm cơ thể cần trùng với trọng tâm của xe.","D":" Cả ba ý trên."},"answer":"D"},
{"num":262,"id":262,"q":"Khi lái xe ô tô điện xuống dốc dài, đổ đèo, người lái xe cần chú ý những vấn đề gì để bảo đảm an toàn?","opts":{"A":"Kiểm tra hệ thống an toàn, pin của xe trước khi xuất phát.","B":"Nhả chân ga để phanh tái sinh hoạt động.","C":"Rà phanh chân để kịp thời xử lý tình huống khẩn cấp.","D":" Cả ba ý trên."},"answer":"D"},
{"num":263,"id":263,"q":"Khi lái xe ô tô điện qua khu vực ngập nước, người lái xe cần phải chú ý những vấn đề gì?","opts":{"A":"Người lái xe phải tìm hiểu khả năng chìm trong nước của xe để xác định cung đường di chuyển.","B":"Giữ vững tay lái, đi đều ga, tránh không để xe chết máy giữa dòng, không nên dừng xe trên đường ngập nước.","C":"Lái xe tốc độ chậm, không tạo sóng và giữ khoảng cách an toàn với các phương tiện xung quanh, nhất là người đi bộ.","D":" Cả ba ý trên."},"answer":"D"}
]},


{"id": "phan-4", "title": "Cấu tạo", "count": 37, "questions": [
{"num":264,"id":264,"q":"Phương pháp kiểm tra mức dầu bôi trơn động cơ nào dưới đây là đúng?","opts":{"A":"Kiểm tra que thăm dầu trên các-te. Quan sát vệt dầu trên que thăm, mức dầu này phải nằm ở mức tối đa được thể hiện trên que thăm.","B":"Rút que thăm dầu trên các-te. Quan sát vệt dầu trên que thăm, mức dầu này phải nằm ở mức tối thiểu được thể hiện trên que thăm.","C":" Rút que thăm dầu trên các-te, lau sạch que thăm sau đó cắm vào các-te và rút ra quan sát vệt dầu trên que thăm, mức dầu phải nằm trong khoảng vạch mức tối thiểu và tối đa được thể hiện trên que thăm."},"answer":"C"},
{"num":265,"id":265,"q":"Xe ô tô tham gia giao thông đường bộ phải bảo đảm các quy định về chất lượng, an toàn kỹ thuật và bảo vệ môi trường nào dưới đây?","opts":{"A":"Kính chắn gió, kính cửa phải là loại kính an toàn, bảo đảm tầm nhìn cho người điều khiển; có đủ hệ thống hãm và hệ thống chuyển hướng có hiệu lực, tay lái xe ô tô ở bên trái của xe, có còi với âm lượng đúng quy chuẩn kỹ thuật.","B":"Có đủ đèn chiếu sáng gần và xa, đèn soi biển số, đèn báo hãm, đèn tín hiệu; có đủ bộ phận giảm thanh, giảm khói, các kết cấu phải đủ độ bền và bảo đảm tính năng vận hành ổn định.","C":" Cả hai ý trên."},"answer":"C"},
{"num":266,"id":266,"q":"Xe mô tô và xe ô tô tham gia giao thông trên đường bộ có bắt buộc phải đủ bộ phận giảm thanh không?","opts":{"A":"Không bắt buộc.","B":" Bắt buộc.","C":"Tùy từng trường hợp."},"answer":"B"},
{"num":267,"id":267,"q":"Xe ô tô tham gia giao thông trên đường bộ phải có đủ các loại đèn nào dưới đây?","opts":{"A":"Đèn chiếu sáng gần và xa.","B":"Đèn soi biển số, đèn báo hãm và đèn tín hiệu.","C":"Dàn đèn pha trên nóc xe.","D":" Ý 1 và ý 2."},"answer":"D"},
{"num":268,"id":268,"q":"Kính chắn gió của xe ô tô phải bảo đảm yêu cầu nào dưới đây?","opts":{"A":" Là loại kính an toàn, kính nhiều lớp, đúng quy cách, không rạn nứt, bảo đảm hình ảnh quan sát rõ ràng, không bị méo mó.","B":"Là loại kính trong suốt, không rạn nứt, bảo đảm tầm nhìn cho người điều khiển về phía trước mặt và hai bên."},"answer":"A"},
{"num":269,"id":269,"q":"Bánh xe, lốp lắp cho xe ô tô phải bảo đảm an toàn kỹ thuật như thế nào dưới đây?","opts":{"A":"Bánh xe phải có kết cấu chắc chắn, lắp đặt đúng quy cách của nhà sản xuât.","B":"Lốp phải đủ số lượng, đủ áp suất, không phồng rộp, đúng cỡ lốp của nhà sản xuất hoặc tài liệu kỹ thuật quy định; lốp trên cùng một trục của xe sử dụng trong điều kiện hoạt động bình thường phải cùng kiểu loại.","C":" Cả hai ý trên."},"answer":"C"},
{"num":270,"id":270,"q":"Hệ thống lái trên xe ô tô phải bảo đảm yêu cầu nào dưới đây?","opts":{"A":"Bảo đảm cho xe chuyển hướng chính xác, điều khiển nhẹ nhàng, an toàn ở mọi vận tốc và tải trọng trong phạm vi tính năng kỹ thuật cho phép của xe.","B":"Khi hoạt động các cơ cấu chuyển động của hệ thống lái không được va chạm với bất kỳ bộ phận nào của xe; khi quay vô lăng lái về bên phải và bên trái thì không được có sự khác biệt đáng kể về lực tác động lên vành tay lái.","C":" Cả hai ý trên."},"answer":"C"},
{"num":271,"id":271,"q":"Mục đích của bảo dưỡng thường xuyên đối với xe ô tô có tác dụng gì dưới đây?","opts":{"A":"Bảo dưỡng ô tô thường xuyên làm cho ô tô luôn luôn có tính năng kỹ thuật tốt, giảm cường độ hao mòn của các chi tiết, kéo dài tuổi thọ của xe.","B":"Ngăn ngừa và phát hiện kịp thời các hư hỏng và sai lệch kỹ thuật để khắc phục, giữ gìn được hình thức bên ngoài.","C":" Cả hai ý trên."},"answer":"C"},
{"num":272,"id":272,"q":"Trong các nguyên nhân nêu dưới đây, nguyên nhân nào làm động cơ diesel không nổ?","opts":{"A":" Hết nhiên liệu, lõi lọc nhiên liệu bị tắc, lọc khí bị tắc, nhiên liệu lẫn không khí, tạp chất.","B":"Hết nhiên liệu, lõi lọc nhiên liệu bị tắc, lọc khí bị tắc, nhiên liệu lẫn không khí, không có tia lửa điện.","C":"Hết nhiên liệu, lõi lọc nhiên liệu bị tắc, lọc khí bị tắc, nhiên liệu lẫn không khí và nước, không có tia lửa điện."},"answer":"A"},
{"num":273,"id":273,"q":"Ống xả lắp trên xe ô tô phải bảo đảm yêu cầu an toàn kỹthuật nào dưới đây?","opts":{"A":"Ống xả không được đặt ở vị trí có thể gây cháy xe hoặc ảnh hưởng đến người ngồi trên xe và gây cản trở hoạt động của hệ thống khác.","B":"Miệng thoát khí thải của ống xả không được hướng về phía trước và không được hướng về bên phải theo chiều tiến của xe.","C":" Cả hai ý trên."},"answer":"C"},
{"num":274,"id":274,"q":"Dây đai an toàn lắp trên xe ô tô phải bảo đảm yêu cầu an toàn kỹ thuật nào dưới đây?","opts":{"A":" Đủ số lượng, lắp đặt chắc chắn không bị rách, đứt, khóa cài đóng, mở nhẹ nhàng, không tự mở, không bị kẹt; kéo ra thu vào dễ dàng, cơ cấu hãm giữ chặt dây khi giật dây đột ngột.","B":"Đủ số lượng, lắp đặt chắc chắn không bị rách, đứt, khóa cài đóng, mở nhẹ nhàng, không tự mở, không bị kẹt; kéo ra thu vào dễ dàng, cơ cấu hãm mở ra khi giật dây đột ngột.","C":"Cả hai ý trên."},"answer":"A"},
{"num":275,"id":275,"q":"Thế nào là động cơ 4 kỳ?","opts":{"A":"Là loại động cơ: để hoàn thành một chu trình công tác của động cơ, pít tông thực hiện 2 (hai) hành trình, trong đó có một lần sinh công.","B":" Là loại động cơ: để hoàn thành một chu trình công tác của động cơ, pít tông thực hiện 4 (bốn) hành trình, trong đó có một lần sinh công."},"answer":"B"},
{"num":276,"id":276,"q":"Công dụng của hệ thống bôi trơn đối với động cơ ô tô?","opts":{"A":" Cung cấp một lượng dầu bôi trơn đủ và sạch dưới áp suất nhất định đi bôi trơn cho các chi tiết của động cơ để giảm ma sát, giảm mài mòn, làm kín, làm sạch, làm mát và chống gỉ.","B":"Cung cấp một lượng nhiên liệu đầy đủ và sạch để cho động cơ ô tô hoạt động.","C":"Cả hai ý trên."},"answer":"A"},
{"num":277,"id":277,"q":"Niên hạn sử dụng của xe ô tô tải (tính bắt đầu từ năm sản xuất) không quá bao nhiêu năm?","opts":{"A":"15 năm.","B":"20 năm.","C":" 25 năm."},"answer":"C"},
{"num":278,"id":278,"q":"Niên hạn sử dụng của xe ô tô chở người trên 8 chỗ ngồi (không kể chỗ của người lái xe) tính bắt đầu từ năm sản xuất không quá bao nhiêu năm?","opts":{"A":"5 năm.","B":" 20 năm.","C":"25 năm."},"answer":"B"},
{"num":279,"id":279,"q":"Hãy nêu công dụng của động cơ xe ô tô?","opts":{"A":" Khi làm việc, nhiệt năng được biến đổi thành cơ năng làm trục khủy động cơ quay, truyền lực đến các bánh xe chủ động tạo ra chuyển động tịnh tiến cho xe ô tô.","B":"Khi làm việc, cơ năng được biến đổi thành nhiệt năng và truyền đến các bánh xe chủ động tạo ra chuyển động tịnh tiến cho xe ô tô.","C":"Cả hai ý trên."},"answer":"A"},
{"num":280,"id":280,"q":"Hãy nêu công dụng hệ thống truyền lực của xe ô tô?","opts":{"A":" Dùng để truyền mô men quay từ động cơ tới các bánh xe chủ động của xe ô tô.","B":"Dùng để thay đổi hướng chuyển động hoặc giữ cho xe ô tô chuyển động ổn định theo hướng xác định.","C":"Dùng để làm giảm tốc độ, dừng chuyển động của xe ô tô."},"answer":"A"},
{"num":281,"id":281,"q":"Hãy nêu công dụng ly hợp (côn) của xe ô tô?","opts":{"A":"Dùng để truyền mô men xoắn giữa các trục không cùng nằm trên một đường thẳng và góc lệch trục luôn thay đổi trong quá trình xe ô tô chuyển động.","B":" Dùng để truyền hoặc ngắt truyền động từ động cơ đến hộp số của xe ô tô.","C":"Dùng để truyền truyền động từ hộp số đến bánh xe chủ động của ô tô."},"answer":"B"},
{"num":282,"id":282,"q":"Hãy nêu công dụng hộp số của xe ô tô?","opts":{"A":"Truyền và tăng mô men xoắn giữa các trục vuông góc nhau, bảo đảm cho các bánh xe chủ động quay với tốc độ khác nhau khi sức cản chuyển động ở bánh xe hai bên không bằng nhau.","B":"Truyền và thay đổi mô men xoắn giữa các trục không cùng nằm trên một đường thẳng và góc lệch trục luôn thay đổi trong quá trình ô tô chuyển động, chuyển số êm dịu, dễ điều khiển.","C":" Truyền và thay đổi mô men từ động cơ đến bánh xe chủ động, cắt truyền động từ động cơ đến bánh xe chủ động, bảo đảm cho xe ô tô chuyển động lùi."},"answer":"C"},
{"num":283,"id":283,"q":"Hãy nêu công dụng hệ thống lái của xe ô tô?","opts":{"A":"Dùng để thay đổi mô men từ động cơ tới các bánh xe chủ động khi xe ô tô chuyển động theo hướng xác định.","B":"Dùng để thay đổi mô men giữa các trục vuông góc nhau khi xe ô tô chuyển động theo hướng xác định.","C":" Dùng để thay đổi hướng chuyển động hoặc giữ cho xe ô tô chuyển động ổn định theo hướng xác định."},"answer":"C"},
{"num":284,"id":284,"q":"Hãy nêu công dụng hệ thống phanh của xe ô tô?","opts":{"A":" Dùng để giảm tốc độ, dừng chuyển động của xe ô tô và giữ cho xe ô tô đứng yên trên dốc.","B":"Dùng để thay đổi hướng chuyển động hoặc giữ cho xe ô tô chuyển động ổn định theo hướng xác định.","C":"Dùng để truyền hoặc ngắt truyền động từ động cơ đến bánh xe chủ động của xe ô tô."},"answer":"A"},
{"num":285,"id":285,"q":"Đèn phanh trên xe mô tô có tác dụng gì dưới đây?","opts":{"A":"Có tác dụng cảnh báo cho các xe phía sau biết xe đang giảm tốc để chủ động tránh hoặc giảm tốc để tránh va chạm.","B":"Có tác dụng định vị vào ban đêm với các xe từ phía sau tới để tránh va chạm.","C":" Cả hai ý trên."},"answer":"C"},
{"num":286,"id":286,"q":"Khi động cơ ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây, báo hiệu tình trạng như thế nào của xe ô tô?","img":"q286.jpg","opts":{"A":" Nhiệt độ nước làm mát động cơ quá ngưỡng cho phép.","B":"Áp suất lốp không đủ.","C":"Đang hãm phanh tay.","D":"Cần kiểm tra động cơ."},"answer":"A"},
{"num":287,"id":287,"q":"Khi động cơ ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây, báo hiệu tình trạng như thế nào của xe ô tô?","img":"q287.jpg","opts":{"A":"Báo hiệu hệ thống chống bó cứng khi phanh bị lỗi.","B":"Áp suất lốp không đủ.","C":"Đang hãm phanh tay.","D":" Cần kiểm tra động cơ."},"answer":"D"},
{"num":288,"id":288,"q":"Khi động cơ ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây, báo hiệu tình trạng như thế nào của xe ô tô?","img":"q288.jpg","opts":{"A":"Báo hiệu thiếu dầu phanh.","B":" Áp suất lốp không đủ.","C":"Đang hãm phanh tay.","D":"Sắp hết nhiên liệu."},"answer":"B"},
{"num":289,"id":289,"q":"Khi động cơ ô tô đã khởi động, bảng đồng hồ xuất hiện ký hiệu như hình vẽ dưới đây, báo hiệu tình trạng như thế nào của xe ô tô?","img":"q289.jpg","opts":{"A":" Báo hiệu hệ thống chống bó cứng phanh bị lỗi.","B":"Áp suất lốp không đủ.","C":"Đang hãm phanh tay.","D":"Sắp hết nhiên liệu."},"answer":"A"},
{"num":290,"id":290,"q":"Khi khởi động xe ô tô số tự động có trang bị chìa khóa thông minh có cần đạp hết hành trình bàn đạp chân phanh hay không?","img":"q290.jpg","opts":{"A":" Phải đạp hết hành trình bàn đạp chân phanh.","B":"Không cần đạp phanh.","C":"Tùy từng trường hợp."},"answer":"A"},

{"num":486,"id":486,"q":"Theo hướng mũi tên, xe nào chấp hành đúng quy tắc giao thông?","img":"q486.jpg","opts":{"A":"Xe khách, xe tải, xe mô tô.","B":"Xe tải, xe mô tô.","C":"Chỉ xe con."},"answer":"C","explain":"Xe con chấp hành đúng quy tắc giao thông vì xe đi đúng làn đường được phép, tuân thủ biển báo và vạch kẻ đường. Các xe khác như xe khách, xe tải, xe mô tô có thể vi phạm quy tắc như đi sai làn, không tuân thủ biển báo hoặc vạch kẻ đường nên không đúng quy tắc giao thông."},
{"num":487,"id":487,"q":"Theo hướng mũi tên, thứ tự các xe đi như thế nào là đúng quy tắc giao thông?","img":"q487.jpg","opts":{"A":"Xe tải, xe khách, xe con, xe mô tô.","B":" Xe tải, xe mô tô, xe khách, xe con.","C":"Xe khách, xe tải, xe con, xe mô tô.","D":"Xe mô tô, xe khách, xe tải, xe con."},"answer":"B","explain":"Thứ tự đúng là xe tải, xe mô tô, xe khách, xe con vì phải tuân thủ quy tắc nhường đường tại nơi giao nhau. Xe tải đi trước vì có quyền ưu tiên hoặc đã vào nút giao trước, tiếp theo là xe mô tô, xe khách và cuối cùng là xe con, đảm bảo an toàn và trật tự giao thông tại nơi giao nhau."},
{"num":488,"id":488,"q":"Theo hướng mũi tên, thứ tự các xe đi như thế nào là đúng quy tắc giao thông?","img":"q488.jpg","opts":{"A":" Xe công an đi làm nhiệm vụ khẩn cấp, xe con, xe tải, xe khách.","B":"Xe công an đi làm nhiệm vụ khẩn cấp, xe khách, xe con, xe tải.","C":"Xe công an đi làm nhiệm vụ khẩn cấp, xe tải, xe khách, xe con.","D":"Xe con, xe công an đi làm nhiệm vụ khẩn cấp, xe tải, xe khách."},"answer":"A","explain":"Thứ tự đúng là xe công an đi làm nhiệm vụ khẩn cấp, xe con, xe tải, xe khách vì xe ưu tiên có quyền đi trước. Xe công an đi làm nhiệm vụ khẩn cấp được ưu tiên tuyệt đối, sau đó các xe khác đi theo thứ tự đã vào nút giao, đảm bảo xe ưu tiên được thông hành nhanh chóng để thực hiện nhiệm vụ."},
{"num":489,"id":489,"q":"Theo hướng mũi tên, thứ tự các xe đi như thế nào là đúng quy tắc giao thông?","img":"q489.jpg","opts":{"A":"Xe tải, xe công an đi làm nhiệm vụ khẩn cấp, xe khách, xe con.","B":"Xe công an đi làm nhiệm vụ khẩn cấp, xe khách, xe con, xe tải.","C":"Xe công an đi làm nhiệm vụ khẩn cấp, xe con, xe tải, xe khách.","D":" Xe công an đi làm nhiệm vụ khẩn cấp, xe tải, xe khách, xe con."},"answer":"D","explain":"Thứ tự đúng là xe công an đi làm nhiệm vụ khẩn cấp, xe tải, xe khách, xe con vì xe ưu tiên luôn được đi trước. Xe công an đi làm nhiệm vụ khẩn cấp có quyền ưu tiên tuyệt đối, các xe khác phải nhường đường và đi theo thứ tự đã vào nút giao, đảm bảo an toàn cho xe ưu tiên."},
{"num":490,"id":490,"q":"Theo hướng mũi tên, thứ tự các xe đi như thế nào là đúng quy tắc giao thông?","img":"q490.jpg","opts":{"A":"Xe tải, xe con, xe mô tô.","B":"Xe con, xe tải, xe mô tô.","C":" Xe mô tô, xe con, xe tải.","D":"Xe con, xe mô tô, xe tải."},"answer":"C","explain":"Thứ tự đúng là xe mô tô, xe con, xe tải vì phải tuân thủ quy tắc nhường đường và quyền ưu tiên tại nơi giao nhau. Xe mô tô đi trước vì có quyền ưu tiên hoặc đã vào nút giao trước, tiếp theo là xe con và cuối cùng là xe tải, đảm bảo trật tự và an toàn giao thông."},
{"num":491,"id":491,"q":"Xe nào phải nhường đường trong trường hợp này?","img":"q491.jpg","opts":{"A":" Xe con.","B":"Xe tải."},"answer":"A","explain":"Xe con phải nhường đường vì xe tải có quyền ưu tiên tại nơi giao nhau này. Xe tải đang đi trên đường ưu tiên hoặc đã vào nút giao trước, nên xe con phải dừng lại nhường đường cho xe tải đi trước, đảm bảo an toàn và tuân thủ quy tắc giao thông tại nơi giao nhau."},
{"num":492,"id":492,"q":"Trường hợp này xe nào được quyền đi trước?","img":"q492.jpg","opts":{"A":"Xe mô tô.","B":" Xe con."},"answer":"B","explain":"Xe con được quyền đi trước vì xe con có quyền ưu tiên tại nơi giao nhau này. Xe con đang đi trên đường ưu tiên hoặc đã vào nút giao trước, nên xe mô tô phải nhường đường cho xe con đi trước, tuân thủ đúng quy tắc nhường đường và quyền ưu tiên trong giao thông."},
{"num":493,"id":493,"q":"Thứ tự các xe đi như thế nào là đúng quy tắc giao thông?","img":"q493.jpg","opts":{"A":" Xe con (A), xe cứu thương đi làm nhiệm vụ cấp cứu, xe con (B).","B":"Xe cứu thương đi làm nhiệm vụ cấp cứu, xe con (B), xe con (A).","C":"Xe con (B), xe con (A), xe cứu thương đi làm nhiệm vụ cấp cứu."},"answer":"A","explain":"Thứ tự đúng là xe con A, xe cứu thương đi làm nhiệm vụ cấp cứu, xe con B vì xe ưu tiên được đi sau xe đã vào nút giao trước nhưng vẫn có quyền ưu tiên. Xe con A đi trước vì đã vào nút giao, xe cứu thương đi tiếp theo với quyền ưu tiên, và xe con B đi cuối cùng, đảm bảo xe ưu tiên được thông hành nhanh."},
{"num":494,"id":494,"q":"Thứ tự các xe đi như thế nào là đúng quy tắc giao thông?","img":"q494.jpg","opts":{"A":"Xe cứu thương đi làm nhiệm vụ cấp cứu, xe chữa cháy đi làm nhiệm vụ chữa cháy, xe con.","B":" Xe chữa cháy đi làm nhiệm vụ chữa cháy, xe cứu thương đi làm nhiệm vụ cấp cứu, xe con.","C":"Xe cứu thương đi làm nhiệm vụ cấp cứu, xe con, xe chữa cháy đi làm nhiệm vụ chữa cháy."},"answer":"B","explain":"Thứ tự đúng là xe chữa cháy đi làm nhiệm vụ chữa cháy, xe cứu thương đi làm nhiệm vụ cấp cứu, xe con vì xe chữa cháy có mức độ ưu tiên cao hơn. Trong các xe ưu tiên, xe chữa cháy có mức độ ưu tiên cao nhất, tiếp theo là xe cứu thương, và cuối cùng là các xe thường, đảm bảo nhiệm vụ khẩn cấp được thực hiện kịp thời."},
{"num":495,"id":495,"q":"Xe nào được quyền đi trước trong trường hợp này?","img":"q495.jpg","opts":{"A":"Xe mô tô.","B":" Xe cứu thương đi làm nhiệm vụ cấp cứu."},"answer":"B","explain":"Xe cứu thương đi làm nhiệm vụ cấp cứu được quyền đi trước vì là xe ưu tiên có quyền ưu tiên tuyệt đối. Xe cứu thương đang thực hiện nhiệm vụ cấp cứu nên tất cả các phương tiện khác phải nhường đường, kể cả xe mô tô, đảm bảo xe cứu thương đến nơi cần thiết nhanh nhất có thể."},
{"num":496,"id":496,"q":"Theo hướng mũi tên, xe nào phải nhường đường đi cuối cùng qua nơi giao nhau này?","img":"q496.jpg","opts":{"A":" Xe khách.","B":"Xe tải.","C":"Xe con."},"answer":"A","explain":"Xe khách phải nhường đường đi cuối cùng vì xe khách không có quyền ưu tiên và các xe khác đã vào nút giao trước hoặc có quyền ưu tiên. Xe tải và xe con có quyền đi trước tại nơi giao nhau này, nên xe khách phải chờ và đi cuối cùng, đảm bảo an toàn và trật tự giao thông."},
{"num":497,"id":497,"q":"Theo hướng mũi tên, xe nào phải nhường đường là đúng quy tắc giao thông?","img":"q497.jpg","opts":{"A":" Xe con.","B":"Xe tải."},"answer":"A","explain":"Xe con phải nhường đường vì xe tải có quyền ưu tiên tại nơi giao nhau này. Xe tải đang đi trên đường ưu tiên hoặc đã vào nút giao trước, nên xe con phải dừng lại nhường đường cho xe tải đi trước, tuân thủ đúng quy tắc nhường đường và quyền ưu tiên trong giao thông."},
{"num":498,"id":498,"q":"Xe nào được quyền đi trước trong trường hợp này?","img":"q498.jpg","opts":{"A":"Xe công an đi làm nhiệm vụ khẩn cấp.","B":" Xe chữa cháy đi làm nhiệm vụ chữa cháy."},"answer":"B","explain":"Xe chữa cháy đi làm nhiệm vụ chữa cháy được quyền đi trước vì là xe ưu tiên có mức độ ưu tiên cao nhất. Xe chữa cháy đang thực hiện nhiệm vụ khẩn cấp nên tất cả các phương tiện khác kể cả xe công an đi làm nhiệm vụ khẩn cấp phải nhường đường, đảm bảo nhiệm vụ chữa cháy được ưu tiên tuyệt đối."},
{"num":499,"id":499,"q":"Theo tín hiệu đèn, xe nào được phép đi?","img":"q499.jpg","opts":{"A":" Xe con và xe khách.","B":"Xe mô tô."},"answer":"A","explain":"Xe con và xe khách được phép đi vì đèn tín hiệu cho phép các xe này đi thẳng hoặc rẽ theo hướng của chúng. Xe mô tô không được phép đi vì đèn tín hiệu cấm hoặc không cho phép hướng đi của xe mô tô, cần tuân thủ đúng tín hiệu đèn giao thông để đảm bảo an toàn."},
{"num":500,"id":500,"q":"Theo tín hiệu đèn, xe nào đi là đúng quy tắc giao thông?","img":"q500.jpg","opts":{"A":"Xe khách, xe mô tô.","B":" Xe con, xe tải.","C":"Xe tải, xe mô tô."},"answer":"B","explain":"Xe con và xe tải đi đúng quy tắc giao thông vì đèn tín hiệu cho phép các xe này đi theo hướng của chúng. Xe khách và xe mô tô không đi đúng vì đèn tín hiệu cấm hoặc không cho phép hướng đi của các xe này, cần tuân thủ đúng tín hiệu đèn để tránh vi phạm và đảm bảo an toàn giao thông."},
{"num":501,"id":501,"q":"Trong trường hợp này xe nào được quyền đi trước?","img":"q501.jpg","opts":{"A":"Xe công an đi làm nhiệm vụ khẩn cấp.","B":" Xe quân sự đi làm nhiệm vụ khẩn cấp."},"answer":"B","explain":"Theo quy định về xe ưu tiên, khi cả hai xe đều là xe ưu tiên đi làm nhiệm vụ khẩn cấp, xe quân sự được ưu tiên đi trước xe công an. Các xe ưu tiên phải có tín hiệu còi, cờ, đèn theo quy định và chỉ được ưu tiên khi đang làm nhiệm vụ khẩn cấp."},
{"num":502,"id":502,"q":"Theo tín hiệu đèn, xe tải đi theo hướng nào là đúng quy tắc giao thông?","img":"q502.jpg","opts":{"A":"Hướng 2, 3, 4.","B":" Chỉ hướng 1.","C":"Hướng 1 và 2.","D":"Hướng 3 và 4."},"answer":"B","explain":"Theo tín hiệu đèn giao thông, xe tải chỉ được phép đi theo hướng 1 vì đèn tín hiệu cho phép hướng này. Các hướng khác bị cấm do đèn tín hiệu đỏ hoặc biển báo cấm. Người lái xe phải tuân thủ đúng tín hiệu đèn để đảm bảo an toàn và tránh vi phạm."},
{"num":503,"id":503,"q":"Các xe đi theo hướng mũi tên, những xe nào vi phạm quy tắc giao thông?","img":"q503.jpg","opts":{"A":" Xe khách, xe tải, xe mô tô.","B":"Xe tải, xe con, xe mô tô.","C":"Xe khách, xe con, xe mô tô."},"answer":"A","explain":"Xe khách, xe tải và xe mô tô vi phạm quy tắc giao thông vì các xe này đi không đúng hướng được phép theo biển báo hoặc tín hiệu đèn. Xe con đi đúng quy tắc vì tuân thủ đúng hướng được phép. Các xe vi phạm có thể bị xử phạt và gây nguy hiểm cho giao thông."},
{"num":504,"id":504,"q":"Theo hướng mũi tên, thứ tự các xe đi như thế nào là đúng quy tắc giao thông?","img":"q504.jpg","opts":{"A":"Xe khách, xe tải, xe mô tô, xe con.","B":"Xe con, xe khách, xe tải, xe mô tô.","C":" Xe mô tô, xe tải, xe khách, xe con.","D":"Xe mô tô, xe tải, xe con, xe khách."},"answer":"C","explain":"Thứ tự các xe đi đúng quy tắc giao thông là xe mô tô, xe tải, xe khách, xe con. Thứ tự này được xác định dựa trên quy tắc nhường đường tại nơi giao nhau, xe nào có quyền ưu tiên hoặc đến trước sẽ được đi trước. Các xe phải tuân thủ đúng thứ tự để đảm bảo an toàn."},
{"num":505,"id":505,"q":"Trong trường hợp này xe nào đỗ vi phạm quy tắc giao thông?","img":"q505.jpg","opts":{"A":" Xe tải.","B":"Xe con và mô tô.","C":"Cả ba xe.","D":"Xe con và xe tải."},"answer":"A","explain":"Xe tải đỗ vi phạm quy tắc giao thông vì đỗ ở vị trí không được phép, có thể là đỗ trên vạch kẻ đường, đỗ gần nơi giao nhau, hoặc đỗ ở vị trí cấm đỗ theo biển báo. Xe con và xe mô tô đỗ đúng quy tắc ở vị trí được phép."},
{"num":506,"id":506,"q":"Theo hướng mũi tên, xe nào được quyền đi trước?","img":"q506.jpg","opts":{"A":"Xe tải.","B":" Xe con (B).","C":"Xe con (A)."},"answer":"B","explain":"Xe con (B) được quyền đi trước vì xe này đi thẳng hoặc rẽ phải, có quyền ưu tiên tại nơi giao nhau so với xe con (A) đang rẽ trái hoặc đi từ đường phụ ra. Theo quy tắc nhường đường, xe từ đường phụ phải nhường đường cho xe trên đường chính."},
{"num":507,"id":507,"q":"Theo hướng mũi tên, những hướng nào xe gắn máy được phép đi?","img":"q507.jpg","opts":{"A":" Cả ba hướng.","B":"Chỉ hướng 1 và 3.","C":"Chỉ hướng 1."},"answer":"A","explain":"Xe gắn máy được phép đi cả ba hướng vì không có biển báo cấm hoặc tín hiệu đèn cấm xe gắn máy đi các hướng này. Xe gắn máy có thể đi thẳng, rẽ trái hoặc rẽ phải tùy theo nhu cầu, miễn là tuân thủ đúng quy tắc giao thông và không vi phạm biển báo cấm."},
{"num":508,"id":508,"q":"Xe nào đỗ vi phạm quy tắc giao thông?","img":"q508.jpg","opts":{"A":" Cả hai xe.","B":"Không xe nào vi phạm.","C":"Chỉ xe mô tô vi phạm.","D":"Chỉ xe tải vi phạm."},"answer":"A","explain":"Cả hai xe đều đỗ vi phạm quy tắc giao thông vì đỗ ở vị trí không được phép, có thể là đỗ trên vạch kẻ đường, đỗ gần nơi giao nhau, đỗ ở vị trí cấm đỗ theo biển báo, hoặc đỗ gây cản trở giao thông. Cả xe mô tô và xe tải đều phải tìm vị trí đỗ hợp pháp."},
{"num":509,"id":509,"q":"Xe nào đỗ vi phạm quy tắc giao thông?","img":"q509.jpg","opts":{"A":"Chỉ xe mô tô.","B":"Chỉ xe tải.","C":" Cả ba xe.","D":"Chỉ xe mô tô và xe tải."},"answer":"C","explain":"Cả ba xe đều đỗ vi phạm quy tắc giao thông vì đỗ ở vị trí không được phép, có thể là đỗ trên vạch kẻ đường, đỗ gần nơi giao nhau, đỗ ở vị trí cấm đỗ theo biển báo, hoặc đỗ gây cản trở giao thông. Tất cả các xe phải tìm vị trí đỗ hợp pháp để tránh vi phạm."},
{"num":510,"id":510,"q":"Xe tải kéo xe mô tô ba bánh như hình này có đúng quy tắc giao thông không?","img":"q510.jpg","opts":{"A":"Đúng.","B":"Không đúng."},"answer":"B","explain":"Xe tải kéo xe mô tô ba bánh không đúng quy tắc giao thông vì theo quy định, chỉ được phép kéo xe khi xe bị hỏng và phải có biện pháp đảm bảo an toàn. Việc kéo xe mô tô ba bánh bằng xe tải không đúng quy định và có thể gây nguy hiểm cho giao thông."},
{"num":511,"id":511,"q":"Theo hướng mũi tên, hướng nào xe không được phép đi?","img":"q511.jpg","opts":{"A":"Hướng 2 và 5.","B":" Chỉ hướng 1."},"answer":"B","explain":"Chỉ hướng 1 không được phép đi vì có biển báo cấm hoặc tín hiệu đèn cấm đi theo hướng này. Các hướng khác được phép đi vì không có biển báo cấm hoặc tín hiệu đèn cho phép. Người lái xe phải tuân thủ đúng biển báo và tín hiệu đèn để tránh vi phạm."},
{"num":512,"id":512,"q":"heo hướng mũi tên, những hướng nào xe ô tô không được phép đi?","img":"q512.jpg","opts":{"A":"Hướng 1 và 2.","B":" Hướng 3.","C":"Hướng 1 và 4.","D":"Hướng 2 và 3."},"answer":"B","explain":"Hướng 3 không được phép đi vì có biển báo cấm xe ô tô đi theo hướng này. Các hướng khác được phép đi vì không có biển báo cấm hoặc tín hiệu đèn cho phép. Xe ô tô phải tuân thủ đúng biển báo để tránh vi phạm và đảm bảo an toàn."},
{"num":513,"id":513,"q":"Xe nào vượt đúng quy tắc giao thông?","img":"q513.jpg","opts":{"A":" Cả hai xe đều đúng.","B":"Xe con.","C":"Xe khách."},"answer":"A","explain":"Cả hai xe đều vượt đúng quy tắc giao thông vì cả hai đều vượt từ bên trái, đảm bảo khoảng cách an toàn, không có biển báo cấm vượt, và vượt trong điều kiện an toàn. Cả xe con và xe khách đều tuân thủ đúng quy tắc vượt xe theo quy định."},
